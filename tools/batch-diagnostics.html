<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ThisOne Batch Diagnostics</title>
<style>
body{margin:0;background:#f6f7f9;color:#111827;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{max-width:1200px;margin:auto;padding:28px 16px 60px}h1{font-size:26px;margin:0 0 8px}p,.muted{color:#6b7280}.panel{background:#fff;border:1px solid #e5e7eb;border-radius:20px;padding:18px;margin-top:18px;box-shadow:0 10px 28px rgba(15,23,42,.05)}textarea{width:100%;min-height:250px;box-sizing:border-box;border:1px solid #d1d5db;border-radius:14px;padding:14px;font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}button{border:0;border-radius:999px;background:#111827;color:#fff;font-weight:800;padding:11px 17px;cursor:pointer}button.secondary{background:#fff;color:#111827;border:1px solid #d1d5db}button.danger{background:#991b1b}button:disabled{opacity:.5;cursor:wait}.actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:12px}.bar{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:8px}.fill{height:100%;width:0;background:#111827;transition:.25s}.status{display:flex;justify-content:space-between;gap:12px;margin-top:12px;font-size:13px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-top:14px}.stat{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.stat b{display:block;font-size:22px}.scroll{overflow-x:auto;border:1px solid #e5e7eb;border-radius:16px;background:#fff}table{width:100%;min-width:1120px;border-collapse:collapse;font-size:13px}th,td{padding:9px 8px;border-bottom:1px solid #f1f3f5;text-align:left;vertical-align:middle}th{background:#f9fafb;color:#374151}.row{cursor:pointer}.row:hover td{background:#fafafa}.detail td{background:#fcfcfd;padding:0}.box{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:14px}.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;padding:12px}.pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:3px 9px;font-size:12px;font-weight:900}.a{background:#dcfce7;color:#166534}.b{background:#f3f4f6;color:#374151}.bad{background:#fee2e2;color:#991b1b}.q{background:#ffedd5;color:#9a3412}.info{background:#eef2ff;color:#3730a3}.cut{max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.small{font-size:12px;color:#6b7280}.empty{text-align:center;color:#9ca3af;padding:32px 8px}.title{font-weight:750;overflow-wrap:anywhere}li{margin:7px 0}code{background:#f3f4f6;border-radius:6px;padding:2px 5px}@media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}.box{grid-template-columns:1fr}}
</style>
</head>
<body>
<main>
<h1>ThisOne 배치 진단 자동화</h1>
<p>50개 검색어를 <code>/api/search</code>로 일반 결과를 받은 뒤 <code>/api/chat</code>으로 AI 추천 결과까지 받아 순차 진단한다. 각 검색어 사이에는 1초 딜레이를 둔다.</p>
<section class="panel">
<h2>검색어 입력</h2>
<textarea id="q">정수기
공기청정기
비스포크 AI 콤보
다이슨 에어랩
로보락 S8 MaxV Ultra
안마의자

AI TV
산업용 선풍기
화장지 3겹 30M 30롤
김서방마스크
안전화
무선 청소기
칫솔
세제
휴지
기저귀
양말
슬리퍼

웹캠
백팩
여성 운동화
남성 지갑
선글라스
캐주얼 시계

<div class="actions">
<button id="start" type="button" onclick="window.startDiagnostics&&window.startDiagnostics()">진단 시작</button>
<button id="stop" type="button" class="danger" onclick="window.stopDiagnostics&&window.stopDiagnostics()" hidden>중지</button>
<button id="md" type="button" class="secondary" onclick="window.copyMarkdownResult&&window.copyMarkdownResult()" disabled>마크다운 복사</button>
<button id="csv" type="button" class="secondary" onclick="window.downloadCsvResult&&window.downloadCsvResult()" disabled>CSV 다운로드</button>
<button id="json" type="button" class="secondary" onclick="window.downloadJsonResult&&window.downloadJsonResult()" disabled>JSON 다운로드</button>
<span class="muted">한 줄에 하나씩 입력</span>
</div>
<div class="status"><strong id="status">대기 중</strong><span id="count">0/0</span></div>
<div class="bar"><div id="fill" class="fill"></div></div>
<p id="msg" class="muted"></p>
</section>
<section class="stats"><div class="stat"><b id="sAll">0</b><span class="small">완료</span></div><div class="stat"><b id="sA" style="color:#166534">0</b><span class="small">A 정상</span></div><div class="stat"><b id="sB" style="color:#374151">0</b><span class="small">B 결과 없음</span></div><div class="stat"><b id="sBad" style="color:#991b1b">0</b><span class="small">C~F 문제</span></div><div class="stat"><b id="sQ" style="color:#9a3412">0</b><span class="small">A? 수동 검토</span></div><div class="stat"><b id="sErr" style="color:#991b1b">0</b><span class="small">요청 오류</span></div></section>
<section class="panel"><h2>진단 결과</h2><div class="scroll"><table><thead><tr><th>검색어</th><th>일반결과수</th><th>일반1위</th><th>AI추천1위</th><th>자동분류</th><th>액세서리비율</th><th>렌탈비율</th><th>가격이상치 여부</th><th>상세보기</th></tr></thead><tbody id="body"><tr><td colspan="9" class="empty">진단 시작을 누르면 결과가 표시된다.</td></tr></tbody></table></div></section>
</main>
<script>
(function(){
'use strict';
var ACCESSORY_WORDS=['케이스','필름','커버','거치대','충전기','리필','필터','소모품','부품','브러시','패드','노즐','호환','교체용','악세사리','악세서리'];
var MANAGED_CATEGORIES=['정수기','공기청정기','비데','안마의자','음식물처리기'];
var RENTAL_RE=/렌탈|대여|구독|약정|월납/;
var MODEL_RE=/[A-Z]{2,}[\-\s]?\d{2,}/;
var SEARCH_TIMEOUT=45000,CHAT_TIMEOUT=70000,DELAY=1000;
var rows=[],running=false,halt=false;
function byId(id){return document.getElementById(id)}
function setText(id,text){var n=byId(id);if(n)n.textContent=text}
function setMsg(text){setText('msg',text||'')}
function esc(v){return String(v==null?'':v).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function sleep(ms){return new Promise(function(r){setTimeout(r,ms)})}
function price(v){if(typeof v==='number'&&isFinite(v))return v;var n=Number(String(v||'').replace(/[^0-9]/g,''));return isFinite(n)?n:0}
function won(v){var n=price(v);return n?n.toLocaleString('ko-KR')+'원':'-'}
function title(i){i=i||{};return String(i.name||i.title||i.productName||i.productTitle||'').replace(/<[^>]*>/g,'').trim()}
function store(i){i=i||{};return String(i.store||i.mallName||i.seller||i.shop||'').replace(/<[^>]*>/g,'').trim()}
function iprice(i){i=i||{};return price(i.lprice||i.priceNum||i.totalPriceNum||i.price||i.priceText)}
function itemText(i){i=i||{};return [title(i),store(i),i.delivery||'',i.priceText||'',i.price||''].join(' ')}
function asList(v){return Array.isArray(v)?v.filter(Boolean):[]}
function uniq(items){var seen={};return asList(items).filter(function(i){var k=title(i)+'|'+store(i)+'|'+iprice(i);if(seen[k])return false;seen[k]=true;return true})}
function getQueries(){var q=byId('q');return q?String(q.value||'').split('\n').map(function(v){return v.trim()}).filter(Boolean):[]}
function general(d){d=d||{};return uniq([].concat(asList(d.rawItems),asList(d.naver&&d.naver.items),asList(d.originalItems),asList(d.items)))}
function top(i){return title(i)||'-'}
function hasAny(src,words){return words.some(function(w){return src.indexOf(w)!==-1})}
function managed(q){return MANAGED_CATEGORIES.some(function(w){return String(q).indexOf(w)!==-1})}
function model(i){var m=itemText(i).toUpperCase().match(MODEL_RE);return m?m[0].replace(/[\s-]/g,''):''}
function classify(q,d,error){
 if(error||!d||typeof d!=='object')return{code:'A?',label:'A? 수동검토',why:[error||'응답 파싱 불가'],ar:0,rr:0,ac:0,rc:0,out:false};
 var g=general(d),total=Number(d.total||(d.naver&&d.naver.total)||g.length||0)||0,t5=g.slice(0,5),t10=g.slice(0,10);
 var ac=t5.filter(function(i){return hasAny(itemText(i),ACCESSORY_WORDS)}).length,rc=t5.filter(function(i){return RENTAL_RE.test(itemText(i))}).length;
 var ar=t5.length?ac/t5.length:0,rr=t5.length?rc/t5.length:0,fp=iprice(g[0]),ps=t10.map(iprice).filter(Boolean),avg=ps.length?ps.reduce(function(a,b){return a+b},0)/ps.length:0,out=fp>0&&avg>0&&fp<avg*.3;
 var counts={},rep='';t5.forEach(function(i){var c=model(i);if(c)counts[c]=(counts[c]||0)+1});Object.keys(counts).some(function(c){if(counts[c]>=3){rep=c;return true}return false});
 if(total===0)return{code:'B',label:'B 결과 없음',why:['total === 0'],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
 if(ac>=3)return{code:'C',label:'C 액세서리 과다',why:['상위 5개 중 액세서리 '+ac+'개'],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
 if(!managed(q)&&rc>=3)return{code:'D',label:'D 렌탈 과다',why:['상위 5개 중 렌탈 '+rc+'개'],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
 if(out)return{code:'E',label:'E 가격 이상치',why:['1위 '+won(fp)+' / 상위10 평균 '+won(Math.round(avg))],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
 if(rep)return{code:'F',label:'F 모델 중복',why:['모델코드 '+rep+' 3개 이상'],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
 return{code:'A',label:'A 정상',why:['자동 문제 룰 미감지'],ar:ar,rr:rr,ac:ac,rc:rc,out:out};
}
function fetchText(url,opt,timeout){var c=new AbortController(),t=setTimeout(function(){c.abort()},timeout);return fetch(url,Object.assign({},opt,{signal:c.signal})).then(function(r){return r.text().then(function(txt){if(!r.ok)throw new Error(txt||('HTTP '+r.status));return txt})}).finally(function(){clearTimeout(t)})}
function callSearch(q){var p=new URLSearchParams({q:q,display:'30',start:'1',sort:'sim'});return fetchText('/api/search?'+p.toString(),{method:'GET'},SEARCH_TIMEOUT).then(function(txt){try{return JSON.parse(txt)}catch(e){throw new Error('검색 JSON 파싱 실패: '+e.message)}})}
function slim(i,idx){return{rank:idx+1,name:title(i),price:iprice(i),priceText:won(iprice(i)),store:store(i),delivery:String((i&&i.delivery)||''),brand:String((i&&(i.brand||i.maker))||''),category:[i&&i.category1,i&&i.category2,i&&i.category3,i&&i.category4].filter(Boolean).join('>')}}
function extractJsonArray(raw){var s=String(raw||'').replace(/```json|```/gi,'').trim();try{var p=JSON.parse(s);return Array.isArray(p)?p:asList(p.items||p.recommendations||p.picks)}catch(e){}var a=s.indexOf('['),b=s.lastIndexOf(']');if(a>=0&&b>a){try{var arr=JSON.parse(s.slice(a,b+1));return Array.isArray(arr)?arr:[]}catch(e){}}return[]}
function callAi(q,candidates){if(!candidates.length)return Promise.resolve({items:[],raw:'',error:''});var cand=candidates.slice(0,20).map(slim);var payload={model:'gemini-2.5-flash',system:'너는 ThisOne 배치 진단용 쇼핑 추천기다. 후보 상품 중 실구매 기준으로 가장 적합한 상품 5개를 고른다. 반드시 JSON 배열만 응답한다. 마크다운, 설명문, 코드펜스는 쓰지 않는다.',messages:[{role:'user',content:[{type:'text',text:'검색어: '+q+'\n후보 상품 목록(JSON):\n'+JSON.stringify(cand,null,2)+'\n\n위 후보 중 실구매 기준으로 좋은 상품 5개를 골라 JSON 배열만 반환해라. 각 항목 형식: {"name":"상품명","price":숫자,"store":"스토어","reason":"짧은 추천 이유"}'}]}]};return fetchText('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)},CHAT_TIMEOUT).then(function(raw){return{items:extractJsonArray(raw),raw:raw,error:''}}).catch(function(e){return{items:[],raw:'',error:e.name==='AbortError'?'AI 추천 시간 초과 ('+(CHAT_TIMEOUT/1000)+'초)':e.message}})}
function cname(c){return c==='A'?'a':c==='B'?'b':c==='A?'?'q':'bad'}
function renderItems(items){items=asList(items);if(!items.length)return'<p class="small">표시할 상품 없음</p>';return'<ol>'+items.slice(0,5).map(function(i){return'<li><div class="title">'+esc(top(i))+'</div><div class="small">'+esc(won(iprice(i)))+' · '+esc(store(i)||'-')+'</div></li>'}).join('')+'</ol>'}
function render(){var body=byId('body');if(!body)return;if(!rows.length){body.innerHTML='<tr><td colspan="9" class="empty">진단 시작을 누르면 결과가 표시된다.</td></tr>';return}body.innerHTML=rows.map(function(r,idx){return'<tr class="row" data-detail="d'+idx+'"><td class="cut"><b>'+esc(r.query)+'</b></td><td>'+Number(r.total).toLocaleString('ko-KR')+'</td><td class="cut" title="'+esc(r.generalTop)+'">'+esc(r.generalTop)+'</td><td class="cut" title="'+esc(r.aiTop)+'">'+esc(r.aiTop)+'</td><td><span class="pill '+cname(r.auto.code)+'">'+esc(r.auto.code)+'</span> <span class="small">'+esc(r.auto.label.replace(/^(A\?|[A-F])\s/,''))+'</span></td><td>'+Math.round(r.auto.ar*100)+'% <span class="small">('+(r.auto.ac||0)+'/5)</span></td><td>'+Math.round(r.auto.rr*100)+'% <span class="small">('+(r.auto.rc||0)+'/5)</span></td><td>'+(r.auto.out?'<span class="pill bad">예</span>':'<span class="pill a">아니오</span>')+'</td><td><span class="pill info">열기</span></td></tr><tr id="d'+idx+'" class="detail" hidden><td colspan="9"><div class="box"><div class="card"><h3>일반 상위 5개</h3>'+renderItems(r.generalItems)+'</div><div class="card"><h3>AI 추천 상위 5개</h3>'+renderItems(r.aiItems)+(r.aiError?'<p class="small" style="color:#991b1b">AI 오류: '+esc(r.aiError)+'</p>':'')+'</div><div class="card" style="grid-column:1/-1"><h3>분류 근거</h3><p class="small">'+esc(r.auto.why.join(' / '))+'</p>'+(r.searchError?'<p class="bad" style="font-weight:800">검색 오류: '+esc(r.searchError)+'</p>':'')+'</div></div></td></tr>'}).join('');Array.prototype.forEach.call(document.querySelectorAll('.row'),function(tr){tr.onclick=function(){var d=byId(tr.getAttribute('data-detail'));if(d)d.hidden=!d.hidden}})}
function stats(total){total=typeof total==='number'?total:getQueries().length;setText('sAll',rows.length);setText('sA',rows.filter(function(r){return r.auto.code==='A'}).length);setText('sB',rows.filter(function(r){return r.auto.code==='B'}).length);setText('sBad',rows.filter(function(r){return['C','D','E','F'].indexOf(r.auto.code)!==-1}).length);setText('sQ',rows.filter(function(r){return r.auto.code==='A?'}).length);setText('sErr',rows.filter(function(r){return r.searchError||r.aiError}).length);setText('count',rows.length+'/'+total);var f=byId('fill');if(f)f.style.width=total?Math.round(rows.length/total*100)+'%':'0%';['md','csv','json'].forEach(function(id){var b=byId(id);if(b)b.disabled=!rows.length})}
function makeRow(q,d,ai,err){var g=d?general(d):[],a=asList(ai&&ai.items),auto=classify(q,d,err);return{query:q,total:Number((d&&(d.total||(d.naver&&d.naver.total)))||g.length||0)||0,generalTop:top(g[0]),aiTop:top(a[0]),auto:auto,generalItems:g,aiItems:a,searchError:err||'',aiError:(ai&&ai.error)||'',rawSearch:d||null,rawAi:(ai&&ai.raw)||'',checkedAt:new Date().toISOString()}}
function setRun(on){var s=byId('start'),p=byId('stop');if(s)s.disabled=on;if(p)p.hidden=!on}
window.startDiagnostics=function(){setMsg('진단 시작 버튼 입력됨');var qs=getQueries();if(!qs.length){setMsg('검색어가 비어 있습니다.');return}if(running){setMsg('이미 진단 중입니다.');return}running=true;halt=false;rows=[];setRun(true);render();stats(qs.length);(async function(){try{for(var i=0;i<qs.length;i++){if(halt)break;var q=qs[i],d=null,err='',ai={items:[],raw:'',error:''};setText('status','진단 중: '+(i+1)+'/'+qs.length+' ('+q+') - 일반 검색');try{d=await callSearch(q)}catch(e){err=e.name==='AbortError'?'검색 시간 초과 ('+(SEARCH_TIMEOUT/1000)+'초)':e.message}var g=d?general(d):[];if(!err&&g.length){setText('status','진단 중: '+(i+1)+'/'+qs.length+' ('+q+') - AI 추천 분석');ai=await callAi(q,g)}rows.push(makeRow(q,d,ai,err));render();stats(qs.length);if(i<qs.length-1&&!halt)await sleep(DELAY)}}catch(e){setMsg('실행 오류: '+e.message);console.error(e)}finally{running=false;setRun(false);setText('status',halt?'중지됨: '+rows.length+'/'+qs.length:'완료: '+rows.length+'/'+qs.length)}})()};
window.stopDiagnostics=function(){halt=true;setText('status','중지 요청됨');setMsg('현재 요청이 끝나면 중지합니다.')};
function markdown(){var h=['검색어','일반결과수','일반1위','AI추천1위','자동분류','액세서리비율','렌탈비율','가격이상치 여부'];var out=['# ThisOne 배치 진단 결과','','- 생성시각: '+new Date().toLocaleString('ko-KR'),'- 진단수: '+rows.length,'','| '+h.join(' | ')+' |','| '+h.map(function(){return'-'}).join(' | ')+' |'];rows.forEach(function(r){out.push('| '+[r.query,r.total,r.generalTop,r.aiTop,r.auto.label,Math.round(r.auto.ar*100)+'%',Math.round(r.auto.rr*100)+'%',r.auto.out?'예':'아니오'].map(function(v){return String(v==null?'':v).replace(/\|/g,'/')}).join(' | ')+' |')});return out.join('\n')}
function csv(){var out=[['검색어','일반결과수','일반1위','AI추천1위','자동분류','액세서리비율','렌탈비율','가격이상치 여부','검색오류','AI오류','분류근거']];rows.forEach(function(r){out.push([r.query,r.total,r.generalTop,r.aiTop,r.auto.label,Math.round(r.auto.ar*100)+'%',Math.round(r.auto.rr*100)+'%',r.auto.out?'예':'아니오',r.searchError,r.aiError,r.auto.why.join(' / ')])});return out.map(function(row){return row.map(function(v){return'"'+String(v==null?'':v).replace(/"/g,'""')+'"'}).join(',')}).join('\n')}
function download(name,content,type){var blob=new Blob([content],{type:type});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(a.href)},3000)}
window.copyMarkdownResult=function(){try{navigator.clipboard.writeText(markdown()).then(function(){setMsg('마크다운 복사 완료')})}catch(e){var t=document.createElement('textarea');t.value=markdown();document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();setMsg('마크다운 복사 완료')}};
window.downloadCsvResult=function(){download('thisone-batch-diagnostics-'+Date.now()+'.csv','\uFEFF'+csv(),'text/csv;charset=utf-8')};
window.downloadJsonResult=function(){download('thisone-batch-diagnostics-'+Date.now()+'.json',JSON.stringify(rows,null,2),'application/json;charset=utf-8')};
window.addEventListener('error',function(e){setMsg('페이지 오류: '+e.message)});
document.addEventListener('DOMContentLoaded',function(){stats(getQueries().length);var s=byId('start');if(s)s.addEventListener('click',function(){window.startDiagnostics()})});
stats(getQueries().length);
})();
</script>
</body>
</html>
