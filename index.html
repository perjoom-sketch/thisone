<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ThisOne">
<meta property="og:title" content="ThisOne - 구매결정 AI">
<meta name="theme-color" content="#ffffff">
<title>ThisOne - AI 가격비교 에이전트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#F5F5F3;overflow-x:hidden}
body{color:#1a1a1a;font-family:‘Noto Sans KR’,sans-serif;min-height:100vh;
-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#d4d4d4;border-radius:4px}

:root{
–bg:#F5F5F3;–bg-card:#ffffff;–bg-hover:#f0f0ee;
–border:#e5e5e0;–border-accent:rgba(79,70,229,.2);
–accent:#4f46e5;–accent2:#0d9488;–accent-glow:rgba(79,70,229,.12);
–red:#ef4444;
–text1:#1a1a1a;–text2:#6b7280;–text3:#9ca3af;
–mono:‘DM Mono’,monospace;–display:‘Outfit’,sans-serif;
}

/* === HEADER === */
.hdr{
padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid var(–border);background:rgba(255,255,255,.85);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
position:fixed;top:0;left:0;right:0;z-index:100;height:55px;
}
.logo{display:flex;align-items:center;gap:11px;cursor:default}
.logo-mark{
width:28px;height:28px;
display:flex;align-items:center;justify-content:center;
}
.logo-name{font-family:var(–display);font-size:19px;font-weight:800;color:var(–text1);letter-spacing:-.04em}
.logo-name span{
background:linear-gradient(135deg,#4f46e5,#0d9488);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:10px;color:var(–text3);letter-spacing:.02em;font-weight:400}
.badge{
font-family:var(–mono);font-size:10px;letter-spacing:.08em;
color:var(–accent);border:1px solid var(–border-accent);
background:rgba(79,70,229,.05);border-radius:6px;padding:4px 10px;
}

/* === LANDING === */
#landing{
min-height:100vh;min-height:100dvh;padding-top:55px;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
}

#welcome{text-align:center;margin-bottom:36px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.welcome-icon{margin-bottom:18px;display:flex;justify-content:center}
#welcome h2{
font-family:var(–display);font-size:38px;font-weight:800;color:var(–text1);
margin-bottom:14px;letter-spacing:-.04em;line-height:1.2;
}
#welcome h2 em{
font-style:normal;
background:linear-gradient(135deg,#4f46e5,#0d9488);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#welcome p{font-size:16px;color:var(–text2);line-height:1.8;font-weight:300}

/* Search box */
.search-box{
background:#ffffff;border:2px solid #d1d5db;
border-radius:16px;display:flex;align-items:center;
padding:8px 8px 8px 20px;gap:8px;
transition:border-color .3s,box-shadow .3s;
box-shadow:0 4px 20px rgba(0,0,0,.07);
}
.search-box:focus-within{
border-color:var(–accent);
box-shadow:0 0 0 3px rgba(79,70,229,.1),0 6px 24px rgba(0,0,0,.08);
}
.msg-input{
flex:1;background:none;border:none;outline:none;
font-family:‘Noto Sans KR’,sans-serif;font-size:16px;color:var(–text1);
padding:10px 0;resize:none;max-height:100px;line-height:1.6;font-weight:400;
}
.msg-input::placeholder{color:#9ca3af;font-weight:400}

.img-btn{
width:40px;height:40px;border-radius:10px;border:1px solid #e5e7eb;
background:#f3f4f6;color:#6b7280;font-size:17px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.img-btn:hover{background:#e5e7eb;color:#4b5563}
.img-btn:active{background:rgba(79,70,229,.1);color:var(–accent)}

.send-btn{
width:44px;height:44px;border-radius:12px;border:none;
background:linear-gradient(135deg,#4f46e5,#4338ca);color:#fff;font-size:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
box-shadow:0 2px 12px var(–accent-glow);transition:all .15s;
}
.send-btn:hover{box-shadow:0 4px 20px rgba(79,70,229,.25);transform:translateY(-1px)}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{background:#d1d5db;color:#9ca3af;box-shadow:none}

.search-wrap{width:100%;max-width:640px;padding:0 20px;animation:fadeUp .6s ease .1s both}
.search-hint{margin:10px 0 0;font-size:12px;color:var(–text3);font-weight:300;letter-spacing:.01em}

/* Image preview */
.img-preview{
display:none;margin:8px 0 0;
background:rgba(79,70,229,.04);border:1px solid var(–border-accent);
border-radius:10px;padding:8px 12px;align-items:center;gap:10px;
}
.img-preview.show{display:flex}
.pv-img{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid var(–border)}
.pv-name{font-size:11px;color:var(–accent);flex:1;font-weight:500}
.pv-del{
background:none;border:none;color:var(–text3);font-size:15px;cursor:pointer;
width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
transition:all .15s;
}
.pv-del:hover{background:rgba(239,68,68,.06);color:var(–red)}

/* Chips */
#chips{
display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
margin-top:18px;max-width:640px;padding:0 20px;
animation:fadeUp .6s ease .2s both;
}
.chip{
background:var(–bg-card);border:1px solid var(–border);border-radius:100px;
padding:9px 18px;font-size:13.5px;color:var(–text2);cursor:pointer;white-space:nowrap;
-webkit-tap-highlight-color:transparent;transition:all .2s;
box-shadow:0 1px 3px rgba(0,0,0,.03);
}
.chip:hover{border-color:var(–accent);color:var(–accent);background:rgba(79,70,229,.03)}
.chip:active{transform:scale(.96)}

/* === STICKY SEARCH === */
#stickySearch{
display:none;
position:sticky;top:55px;z-index:99;
padding:12px 20px 10px;
background:rgba(245,245,243,.85);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-bottom:1px solid var(–border);
}
#stickySearch .search-box{max-width:640px;margin:0 auto}
#stickySearch .img-preview{max-width:640px;margin:6px auto 0}

/* === RESULTS === */
.content{padding:20px;max-width:700px;margin:0 auto;display:none}

.user-msg-wrap{animation:msgIn .4s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.user-msg-label{
font-size:10px;color:var(–text3);margin-bottom:7px;
font-family:var(–mono);letter-spacing:.04em;
display:flex;align-items:center;gap:6px;
}
.user-msg-label::before{
content:’’;width:14px;height:14px;border-radius:50%;
background:rgba(0,0,0,.04);display:inline-flex;
}
.user-msg{
background:var(–bg-card);border:1px solid var(–border);border-radius:13px;
padding:14px 18px;margin-bottom:24px;font-size:14px;color:var(–text2);line-height:1.6;
box-shadow:0 1px 4px rgba(0,0,0,.03);
}

.ai-result{margin-bottom:28px;animation:msgIn .5s ease}
.ai-label{
font-size:10px;color:var(–text3);margin-bottom:10px;
font-family:var(–mono);display:flex;align-items:center;gap:7px;letter-spacing:.04em;
}
.ai-label .dot{
width:20px;height:20px;border-radius:7px;
background:linear-gradient(135deg,#4f46e5,#0d9488);
display:flex;align-items:center;justify-content:center;
box-shadow:0 2px 8px var(–accent-glow);
}

.pick-card{
background:var(–bg-card);border:1.5px solid var(–border-accent);
border-radius:16px;padding:22px;margin-bottom:12px;
position:relative;overflow:hidden;
box-shadow:0 2px 12px rgba(79,70,229,.05);
}
.pick-card::before{
content:’’;position:absolute;top:0;left:0;right:0;height:3px;
background:linear-gradient(90deg,#4f46e5,#0d9488,transparent);
}
.pick-badge{
display:inline-flex;align-items:center;gap:5px;
background:linear-gradient(135deg,#4f46e5,#4338ca);color:#fff;
font-size:11px;font-weight:700;border-radius:8px;padding:5px 12px;margin-bottom:14px;
box-shadow:0 2px 8px var(–accent-glow);letter-spacing:.01em;
}
.pick-title{font-family:var(–display);font-size:19px;font-weight:700;color:var(–text1);margin-bottom:12px;line-height:1.4;letter-spacing:-.02em}
.pick-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.pick-price{font-family:var(–display);font-size:20px;font-weight:800;color:var(–accent)}
.pick-store{font-size:11px;font-weight:600;color:#0d9488;background:rgba(13,148,136,.08);padding:3px 8px;border-radius:4px}
.pick-delivery{font-size:12px;color:var(–text2)}
.pick-review{font-size:12px;color:var(–text2)}
.pick-reason-text{font-size:13px;color:var(–text2);line-height:1.6;padding-top:10px;border-top:1px solid var(–border)}
.pick-badge-sub{background:var(–bg-hover);color:var(–text2);box-shadow:none}
.pick-first{border-color:rgba(79,70,229,.3)}

/* Pick card layout with image */
.pick-body{display:flex;gap:16px;align-items:flex-start}
.pick-img{
width:90px;height:90px;border-radius:10px;object-fit:cover;flex-shrink:0;
border:1px solid var(–border);background:var(–bg-hover);
}
.pick-img-placeholder{
width:90px;height:90px;border-radius:10px;flex-shrink:0;
border:1px solid var(–border);background:var(–bg-hover);
display:flex;align-items:center;justify-content:center;font-size:28px;
}
.pick-info{flex:1;min-width:0}

/* Verdict */
.verdict-card{
background:linear-gradient(135deg,rgba(79,70,229,.04),rgba(13,148,136,.04));
border:1.5px solid rgba(79,70,229,.15);
border-radius:14px;padding:18px 20px;margin-bottom:12px;
}
.verdict-label{font-size:13px;font-weight:700;color:var(–accent);margin-bottom:8px}
.verdict-text{font-size:14px;color:var(–text1);line-height:1.7}

.compare-card{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;overflow:hidden;margin-bottom:12px;
box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.compare-title{
padding:14px 20px;font-size:12px;font-weight:600;color:var(–accent);
border-bottom:1px solid var(–border);display:flex;align-items:center;gap:7px;
}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th{
padding:10px 16px;text-align:left;font-size:11px;color:var(–text3);
font-weight:500;border-bottom:1px solid var(–border);background:#fafaf9;
letter-spacing:.03em;text-transform:uppercase;font-family:var(–mono);
}
.compare-table td{
padding:12px 16px;font-size:13px;color:var(–text1);
border-bottom:1px solid var(–border);transition:background .15s;
}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:first-child td{color:var(–accent);font-weight:600;background:rgba(79,70,229,.03)}
.compare-table tr:hover td{background:#fafaf9}

.reject-card{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;padding:18px 20px;margin-bottom:12px;
box-shadow:0 1px 4px rgba(0,0,0,.03);
}
.reject-title{
font-size:12px;font-weight:600;color:var(–red);margin-bottom:14px;
display:flex;align-items:center;gap:7px;
}
.reject-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.reject-item:last-child{margin-bottom:0}
.reject-dot{
color:var(–red);margin-top:4px;flex-shrink:0;font-size:10px;
width:16px;height:16px;border-radius:50%;background:rgba(239,68,68,.06);
display:flex;align-items:center;justify-content:center;
}
.reject-text{font-size:13px;color:var(–text3);line-height:1.65}
.reject-name{color:var(–text2);font-weight:600}

.typing-wrap{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.03);
text-align:center;
}
.typing-steps{display:flex;flex-direction:column;gap:12px;align-items:center}
.typing-spinner{
width:40px;height:40px;border:3px solid var(–border);border-top-color:var(–accent);
border-radius:50%;animation:spin .8s linear infinite;margin-bottom:4px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.typing-msg{font-size:13px;color:var(–text2);font-weight:400;animation:typingFade 2s ease-in-out infinite}
.typing-sub{font-size:11px;color:var(–text3);font-weight:300}
@keyframes typingFade{0%,100%{opacity:.6}50%{opacity:1}}

/* Search history chip */
.history-bar{
max-width:640px;margin:0 auto;padding:4px 0;
display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
}
.history-bar::-webkit-scrollbar{display:none}
.history-chip{
flex-shrink:0;padding:5px 12px;border-radius:100px;
font-size:11px;color:var(–text3);background:var(–bg-card);
border:1px solid var(–border);cursor:pointer;white-space:nowrap;
transition:all .2s;
}
.history-chip:hover{border-color:var(–accent);color:var(–accent)}

#fileInput{display:none}

@media(max-width:640px){
.hdr{padding:12px 16px;height:50px}
#landing{
padding-top:50px;min-height:0;
justify-content:flex-start;
padding-bottom:40px;
}
#welcome{margin-top:28px;margin-bottom:18px}
#welcome h2{font-size:22px}
#welcome p{font-size:13px}
.welcome-icon{margin-bottom:10px}
.welcome-icon svg{width:48px;height:48px}
#chips{padding:0 16px;gap:8px}
.chip{padding:8px 14px;font-size:12.5px}
.search-wrap{padding:0 16px}
.search-hint{font-size:10px}
#stickySearch{padding:10px 16px 8px;top:50px}
.content{padding:16px}
.pick-title{font-size:17px}
.pick-img,.pick-img-placeholder{width:70px;height:70px}
.compare-table th,.compare-table td{padding:9px 10px;font-size:11.5px}
}
</style>

</head>

<!-- LANDING -->

<div id="landing">
  <div id="welcome">

      <defs>

    </svg></div>
    <h2>고민 끝. <em>This One.</em></h2>

  <div class="search-wrap" id="landingSearch">

</div>

<!-- STICKY SEARCH -->

<div id="stickySearch">
  <div class="search-box">
    <textarea class="msg-input" id="msgInput2" placeholder="다른 상품도 물어보세요" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="img-btn" onclick="document.getElementById('fileInput').click()"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
    <button class="send-btn" id="sendBtn2" onclick="sendMsg()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg></button>
  </div>
  <div class="img-preview" id="imgPreview2">
    <img class="pv-img" id="previewImg2" src="" alt="">
    <span class="pv-name" id="previewName2"></span>
    <button class="pv-del" onclick="removeImg()">✕</button>
  </div>
</div>

<!-- RESULTS -->

<div class="content" id="content"></div>

<input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

<script>
const MODEL='claude-sonnet-4-20250514';
const MINI_SCOPE='<svg width="10" height="10" viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="14" stroke="#fff" stroke-width="4" fill="none" opacity=".7"/><circle cx="32" cy="32" r="5" fill="#fff"/><line x1="32" y1="6" x2="32" y2="18" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".8"/><line x1="32" y1="46" x2="32" y2="58" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".8"/><line x1="6" y1="32" x2="18" y2="32" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".8"/><line x1="46" y1="32" x2="58" y2="32" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity=".8"/></svg>';
let pendingImg=null;
let loading=false;
let history=[];
let isSearchMode=false;

const PROMPT=`당신은 ThisOne 구매결정 AI입니다.
사용자가 상품을 물어보면 웹 검색으로 네이버 쇼핑, 쿠팡, 다나와 등에서 실제 가격과 상품 이미지를 찾아 분석하고, 반드시 아래 JSON 형식으로만 답하세요. JSON 외 다른 텍스트 없이.

3가지 관점에서 각각 최선의 상품을 추천하세요:
- 가성비 최고 (가격 우선)
- 신뢰 브랜드 (브랜드/신뢰 우선)  
- ThisOne 추천 (종합 최선)

중요: image 필드에는 반드시 실제 상품 이미지 URL(https://로 시작하는 jpg, png, webp 등)을 넣어주세요. 네이버 쇼핑, 쿠팡 등에서 검색한 실제 상품 대표 이미지 URL을 사용하세요.

{
  "picks": [
    {"type":"A","label":"가성비 최고","name":"상품명","price":"가격","store":"판매처","delivery":"배송정보","review":"⭐4.5","reason":"추천 이유 한줄","image":"실제 상품 이미지 URL"},
    {"type":"B","label":"신뢰 브랜드","name":"상품명","price":"가격","store":"판매처","delivery":"배송정보","review":"⭐4.8","reason":"추천 이유 한줄","image":"실제 상품 이미지 URL"},
    {"type":"C","label":"ThisOne 추천","name":"상품명","price":"가격","store":"판매처","delivery":"배송정보","review":"⭐4.7","reason":"추천 이유 한줄","image":"실제 상품 이미지 URL"}
  ],
  "verdict":"그래도 하나만 고르자면 — 추천하는 이유 한두 문장",
  "rejects": [
    {"name":"탈락상품명","reason":"탈락이유"}
  ]
}`;

function getInput(){return document.getElementById(isSearchMode?'msgInput2':'msgInput');}
function getSendBtn(){return document.getElementById(isSearchMode?'sendBtn2':'sendBtn');}

let searchHistory=[];

function goHome(){
  isSearchMode=false;
  document.getElementById('landing').style.display='';
  document.getElementById('stickySearch').style.display='none';
  document.getElementById('content').style.display='none';
  document.getElementById('content').innerHTML='';
}

function switchToSearchMode(){
  if(isSearchMode)return;
  isSearchMode=true;
  document.getElementById('landing').style.display='none';
  document.getElementById('stickySearch').style.display='block';
  document.getElementById('content').style.display='block';
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function quick(t){document.getElementById('msgInput').value=t;autoResize(document.getElementById('msgInput'));sendMsg();}

function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    pendingImg={data:ev.target.result.split(',')[1],src:ev.target.result};
    ['','2'].forEach(s=>{
      const el=document.getElementById('previewImg'+s);
      const nm=document.getElementById('previewName'+s);
      const pv=document.getElementById('imgPreview'+s);
      if(el)el.src=ev.target.result;
      if(nm)nm.textContent=file.name;
      if(pv)pv.classList.add('show');
    });
  };
  r.readAsDataURL(file);e.target.value='';
}
function removeImg(){
  pendingImg=null;
  ['','2'].forEach(s=>{
    const pv=document.getElementById('imgPreview'+s);
    if(pv)pv.classList.remove('show');
  });
}

async function sendMsg(){
  if(loading)return;
  const inp=getInput();
  const txt=inp.value.trim();
  if(!txt&&!pendingImg)return;

  switchToSearchMode();

  // (2) 이전 결과 지우기
  document.getElementById('content').innerHTML='';

  // 검색이력 추가
  if(txt) searchHistory.push(txt);

  const uc=[];
  if(pendingImg)uc.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:pendingImg.data}});
  uc.push({type:'text',text:txt||'이 이미지 상품을 가격비교해줘'});

  // 검색이력 바 렌더
  renderHistoryBar();
  addUserMsg(txt||'📷 이미지로 검색',pendingImg?.src);
  history.push({role:'user',content:uc});
  inp.value='';autoResize(inp);removeImg();

  loading=true;
  getSendBtn().disabled=true;
  const typingEl=addTyping();

  try{
    let data;
    // 웹 검색 포함 시도
    try{
      const res=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          model:MODEL,
          max_tokens:4096,
          system:PROMPT,
          messages:history,
          tools:[{type:'web_search_20250305',name:'web_search',max_uses:5}]
        })
      });
      data=await res.json();
      // API 에러면 웹 검색 없이 재시도
      if(data.error){
        console.warn('웹 검색 실패, 재시도:',data.error);
        const res2=await fetch('/api/chat',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({model:MODEL,max_tokens:4096,system:PROMPT,messages:history})
        });
        data=await res2.json();
      }
    }catch(fetchErr){
      // fetch 자체 실패 시 웹 검색 없이 재시도
      console.warn('fetch 실패, 재시도:',fetchErr);
      const res2=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:MODEL,max_tokens:4096,system:PROMPT,messages:history})
      });
      data=await res2.json();
    }
    typingEl.remove();
    if(data.error){
      addFallback('API 오류: '+(data.error.message||JSON.stringify(data.error)));
    }else{
      const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
      history.push({role:'assistant',content:raw});
      try{
        let clean=raw.replace(/```json|```/g,'').trim();
        const jsonMatch=clean.match(/\{[\s\S]*\}/);
        if(jsonMatch) clean=jsonMatch[0];
        const j=JSON.parse(clean);
        addResultCard(j);
      }catch{
        addFallback(raw||'응답을 파싱할 수 없습니다.');
      }
    }
  }catch(err){
    typingEl.remove();
    addFallback('검색 중 오류: '+err.message);
  }
  loading=false;
  getSendBtn().disabled=false;
  getInput().focus();
}

function renderHistoryBar(){
  if(searchHistory.length<2)return;
  let existing=document.getElementById('historyBar');
  if(existing)existing.remove();
  const bar=document.createElement('div');
  bar.className='history-bar';
  bar.id='historyBar';
  searchHistory.slice(-10).forEach(q=>{
    const c=document.createElement('div');
    c.className='history-chip';
    c.textContent='🔍 '+q;
    c.onclick=()=>{document.getElementById('msgInput2').value=q;autoResize(document.getElementById('msgInput2'));sendMsg();};
    bar.appendChild(c);
  });
  document.getElementById('content').appendChild(bar);
}

function addUserMsg(txt,imgSrc){
  const d=document.createElement('div');
  d.className='user-msg-wrap';
  d.innerHTML=`<div class="user-msg-label">🔍 검색</div>
    <div class="user-msg">${imgSrc?`<img src="${imgSrc}" style="max-width:160px;border-radius:8px;margin-bottom:8px;display:block;">`:''}${esc(txt)}</div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addResultCard(j){
  const d=document.createElement('div');
  d.className='ai-result';

  const icons={A:'💰',B:'🏆',C:'🎯'};
  const colors={A:'#16a34a',B:'#2563eb',C:'var(--accent)'};
  const fallbackEmoji={A:'📦',B:'🏅',C:'🎯'};

  let html=`<div class="ai-label"><div class="dot">${MINI_SCOPE}</div> ThisOne 분석</div>`;

  if(j.picks&&j.picks.length){
    j.picks.forEach(p=>{
      const t=p.type||'C';
      const isC=t==='C';
      const initial=p.name?p.name.charAt(0):'?';
      const bgColors={A:'#dcfce7',B:'#dbeafe',C:'#ede9fe'};
      const fgColors={A:'#16a34a',B:'#2563eb',C:'#4f46e5'};
      const placeholderHtml=`<div class="pick-img-placeholder" style="background:${bgColors[t]};color:${fgColors[t]};font-weight:700;font-size:22px">${initial}</div>`;
      const imgHtml=p.image
        ?`<img class="pick-img" referrerpolicy="no-referrer" crossorigin="anonymous" src="${esc(p.image)}" onerror="this.outerHTML=this.getAttribute('data-fallback')" data-fallback='${placeholderHtml.replace(/'/g,"&#39;")}' alt="${esc(p.name)}">`
        :placeholderHtml;
      html+=`<div class="pick-card ${isC?'pick-first':''}">
        <div class="pick-badge" style="${isC?'':'background:'+colors[t]+';box-shadow:none'}">${icons[t]||'🎯'} ${esc(p.label)}</div>
        <div class="pick-body">
          ${imgHtml}
          <div class="pick-info">
            <div class="pick-title">${esc(p.name)}</div>
            <div class="pick-meta">
              <span class="pick-price">${esc(p.price)}</span>
              <span class="pick-store">${esc(p.store)}</span>
              <span class="pick-delivery">🚚 ${esc(p.delivery)}</span>
              <span class="pick-review">${esc(p.review)}</span>
            </div>
          </div>
        </div>
        <div class="pick-reason-text">${esc(p.reason)}</div>
      </div>`;
    });
  }

  if(j.verdict){
    html+=`<div class="verdict-card">
      <div class="verdict-label">🎯 그래도 하나만 고르자면</div>
      <div class="verdict-text">${esc(j.verdict)}</div>
    </div>`;
  }

  if(j.rejects&&j.rejects.length){
    html+=`<div class="reject-card"><div class="reject-title">❌ 탈락 이유</div>`;
    j.rejects.forEach(r=>{
      html+=`<div class="reject-item"><div class="reject-dot">✕</div>
        <div class="reject-text"><span class="reject-name">${esc(r.name)}</span> — ${esc(r.reason)}</div></div>`;
    });
    html+=`</div>`;
  }

  d.innerHTML=html;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addFallback(txt){
  const d=document.createElement('div');
  d.className='ai-result';
  const fmt=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  d.innerHTML=`<div class="ai-label"><div class="dot">${MINI_SCOPE}</div> ThisOne 분석</div>
    <div class="pick-card" style="border-color:var(--border)">${fmt}</div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addTyping(){
  const d=document.createElement('div');
  d.className='ai-result';
  d.innerHTML=`<div class="ai-label"><div class="dot">${MINI_SCOPE}</div> 검색 중...</div>
    <div class="typing-wrap">
      <div class="typing-steps">
        <div class="typing-spinner"></div>
        <div class="typing-msg">상품을 검색하고 있어요...</div>
        <div class="typing-sub">가격, 리뷰, 배송 정보를 비교하는 중</div>
      </div>
    </div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});

  // 진행 메시지 변경
  const msgs=['상품을 검색하고 있어요...','가격을 비교하고 있어요...','리뷰를 분석하고 있어요...','최선의 선택을 고르는 중...'];
  const subs=['가격, 리뷰, 배송 정보를 비교하는 중','여러 쇼핑몰에서 최저가 확인 중','실구매자 후기를 살펴보는 중','A·B·C 안을 정리하고 있어요'];
  let idx=0;
  d._timer=setInterval(()=>{
    idx=(idx+1)%msgs.length;
    const m=d.querySelector('.typing-msg');
    const s=d.querySelector('.typing-sub');
    if(m)m.textContent=msgs[idx];
    if(s)s.textContent=subs[idx];
  },3000);
  const origRemove=d.remove.bind(d);
  d.remove=()=>{clearInterval(d._timer);origRemove();};
  return d;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

</body>
</html>
