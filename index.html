<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ThisOne">
<meta property="og:title" content="ThisOne - 구매결정 AI">
<meta name="theme-color" content="#08090e">
<title>ThisOne - AI 가격비교 에이전트</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=DM+Mono:wght@400;500&family=Outfit:wght@400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#08090e;overflow-x:hidden}
body{color:#c9cdd8;font-family:‘Noto Sans KR’,sans-serif;min-height:100vh;
-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}

body::before{content:’’;position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.35;
background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 256 256’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.85’ numOctaves=‘4’ stitchTiles=‘stitch’/%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’ opacity=‘0.035’/%3E%3C/svg%3E”);
background-repeat:repeat;background-size:200px}

::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#1e2235;border-radius:4px}

:root{
–bg:#08090e;–bg-card:#12141e;–bg-hover:#181b28;
–border:#1a1d2e;–border-accent:rgba(110,96,255,.25);
–accent:#6e60ff;–accent2:#3ecfb2;–accent-glow:rgba(110,96,255,.2);
–red:#f05252;
–text1:#eaecf3;–text2:#8b90a5;–text3:#4a4e65;
–mono:‘DM Mono’,monospace;–display:‘Outfit’,sans-serif;
}

/* === HEADER === */
.hdr{
padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid var(–border);background:rgba(8,9,14,.82);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
position:fixed;top:0;left:0;right:0;z-index:100;height:55px;
}
.logo{display:flex;align-items:center;gap:11px;cursor:default}
.logo-mark{
width:32px;height:32px;border-radius:9px;
background:linear-gradient(135deg,#6e60ff,#3ecfb2);
display:flex;align-items:center;justify-content:center;
font-family:var(–display);font-size:15px;font-weight:800;color:#fff;
box-shadow:0 0 20px var(–accent-glow),inset 0 1px 0 rgba(255,255,255,.2);
}
.logo-name{font-family:var(–display);font-size:19px;font-weight:800;color:#fff;letter-spacing:-.04em}
.logo-name span{
background:linear-gradient(135deg,#6e60ff,#3ecfb2);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.logo-sub{font-size:10px;color:var(–text3);letter-spacing:.02em;font-weight:400}
.badge{
font-family:var(–mono);font-size:10px;letter-spacing:.08em;
color:var(–accent);border:1px solid var(–border-accent);
background:rgba(110,96,255,.06);border-radius:6px;padding:4px 10px;
}

/* ===================================================
LANDING: 화면 중앙에 타이틀 + 검색 + 칩 모아놓기
=================================================== */
#landing{
min-height:100vh;min-height:100dvh;padding-top:55px;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
}

#welcome{text-align:center;margin-bottom:36px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.welcome-icon{font-size:56px;margin-bottom:18px;filter:drop-shadow(0 4px 12px rgba(110,96,255,.3))}
#welcome h2{
font-family:var(–display);font-size:38px;font-weight:800;color:#fff;
margin-bottom:14px;letter-spacing:-.04em;line-height:1.2;
}
#welcome h2 em{
font-style:normal;
background:linear-gradient(135deg,#6e60ff,#3ecfb2);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#welcome p{font-size:16px;color:var(–text2);line-height:1.8;font-weight:300}

/* Search box (shared) */
.search-box{
background:#1a1e2e;border:1.5px solid #3a3f58;
border-radius:16px;display:flex;align-items:center;
padding:8px 8px 8px 20px;gap:8px;
transition:border-color .3s,box-shadow .3s;
box-shadow:0 4px 24px rgba(0,0,0,.3);
}
.search-box:focus-within{
border-color:var(–accent);background:#1e2236;
box-shadow:0 0 0 3px rgba(110,96,255,.1),0 8px 40px rgba(0,0,0,.4);
}
.msg-input{
flex:1;background:none;border:none;outline:none;
font-family:‘Noto Sans KR’,sans-serif;font-size:16px;color:var(–text1);
padding:10px 0;resize:none;max-height:100px;line-height:1.6;font-weight:400;
}
.msg-input::placeholder{color:#7a7e98;font-weight:400}

.img-btn{
width:40px;height:40px;border-radius:10px;border:none;
background:rgba(255,255,255,.1);color:#a0a4be;font-size:17px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;transition:all .15s;
}
.img-btn:hover{background:rgba(110,96,255,.15);color:#c8cbdf}
.img-btn:active{background:rgba(110,96,255,.15);color:var(–accent)}

.send-btn{
width:44px;height:44px;border-radius:12px;border:none;
background:linear-gradient(135deg,#6e60ff,#5a4ee6);color:#fff;font-size:20px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
-webkit-tap-highlight-color:transparent;
box-shadow:0 2px 20px var(–accent-glow);transition:all .15s;
}
.send-btn:hover{box-shadow:0 4px 24px rgba(110,96,255,.35);transform:translateY(-1px)}
.send-btn:active{transform:scale(.92)}
.send-btn:disabled{background:var(–bg-hover);color:var(–text3);box-shadow:none}

/* Landing search wrapper */
.search-wrap{width:100%;max-width:640px;padding:0 20px;animation:fadeUp .6s ease .1s both}
.search-hint{margin:10px 0 0;font-size:12px;color:var(–text3);font-weight:300;letter-spacing:.01em}

/* Image preview */
.img-preview{
display:none;margin:8px 0 0;
background:rgba(110,96,255,.05);border:1px solid var(–border-accent);
border-radius:10px;padding:8px 12px;align-items:center;gap:10px;
}
.img-preview.show{display:flex}
.pv-img{width:38px;height:38px;border-radius:8px;object-fit:cover;border:1px solid var(–border)}
.pv-name{font-size:11px;color:var(–accent);flex:1;font-weight:500}
.pv-del{
background:none;border:none;color:var(–text3);font-size:15px;cursor:pointer;
width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;
transition:all .15s;
}
.pv-del:hover{background:rgba(240,82,82,.08);color:var(–red)}

/* Chips */
#chips{
display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
margin-top:18px;max-width:640px;padding:0 20px;
animation:fadeUp .6s ease .2s both;
}
.chip{
background:var(–bg-card);border:1px solid #2a2d42;border-radius:100px;
padding:9px 18px;font-size:13.5px;color:var(–text2);cursor:pointer;white-space:nowrap;
-webkit-tap-highlight-color:transparent;transition:all .2s;
}
.chip:hover{border-color:var(–border-accent);color:#b8b0ff;background:rgba(110,96,255,.05)}
.chip:active{transform:scale(.96)}

/* ===================================================
STICKY SEARCH: 검색 후 상단에 고정
=================================================== */
#stickySearch{
display:none;
position:sticky;top:55px;z-index:99;
padding:12px 20px 10px;
background:rgba(8,9,14,.82);
backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
border-bottom:1px solid var(–border);
}
#stickySearch .search-box{max-width:640px;margin:0 auto}
#stickySearch .img-preview{max-width:640px;margin:6px auto 0}

/* ===================================================
RESULTS
=================================================== */
.content{padding:20px;max-width:700px;margin:0 auto;display:none}

.user-msg-wrap{animation:msgIn .4s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.user-msg-label{
font-size:10px;color:var(–text3);margin-bottom:7px;
font-family:var(–mono);letter-spacing:.04em;
display:flex;align-items:center;gap:6px;
}
.user-msg-label::before{
content:’’;width:14px;height:14px;border-radius:50%;
background:rgba(255,255,255,.06);display:inline-flex;
}
.user-msg{
background:var(–bg-card);border:1px solid var(–border);border-radius:13px;
padding:14px 18px;margin-bottom:24px;font-size:14px;color:var(–text2);line-height:1.6;
}

.ai-result{margin-bottom:28px;animation:msgIn .5s ease}
.ai-label{
font-size:10px;color:var(–text3);margin-bottom:10px;
font-family:var(–mono);display:flex;align-items:center;gap:7px;letter-spacing:.04em;
}
.ai-label .dot{
width:20px;height:20px;border-radius:7px;
background:linear-gradient(135deg,#6e60ff,#3ecfb2);
display:flex;align-items:center;justify-content:center;
font-family:var(–display);font-size:9px;font-weight:800;color:#fff;
box-shadow:0 0 10px var(–accent-glow);
}

.pick-card{
background:var(–bg-card);border:1.5px solid var(–border-accent);
border-radius:16px;padding:22px;margin-bottom:12px;
position:relative;overflow:hidden;
}
.pick-card::before{
content:’’;position:absolute;top:0;left:0;right:0;height:2px;
background:linear-gradient(90deg,#6e60ff,#3ecfb2,transparent);
}
.pick-badge{
display:inline-flex;align-items:center;gap:5px;
background:linear-gradient(135deg,#6e60ff,#5a4ee6);color:#fff;
font-size:11px;font-weight:700;border-radius:8px;padding:5px 12px;margin-bottom:14px;
box-shadow:0 2px 12px var(–accent-glow);letter-spacing:.01em;
}
.pick-title{font-family:var(–display);font-size:19px;font-weight:700;color:#fff;margin-bottom:18px;line-height:1.4;letter-spacing:-.02em}
.pick-reasons{display:flex;flex-direction:column;gap:12px}
.pick-reason{display:flex;gap:12px;align-items:flex-start}
.reason-num{
width:24px;height:24px;border-radius:8px;
background:rgba(110,96,255,.1);border:1px solid rgba(110,96,255,.15);
color:var(–accent);font-size:11px;font-weight:700;
display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;
font-family:var(–mono);
}
.reason-text{font-size:13.5px;color:var(–text2);line-height:1.7}

.compare-card{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;overflow:hidden;margin-bottom:12px;
}
.compare-title{
padding:14px 20px;font-size:12px;font-weight:600;color:var(–accent);
border-bottom:1px solid var(–border);display:flex;align-items:center;gap:7px;
}
.compare-table{width:100%;border-collapse:collapse}
.compare-table th{
padding:10px 16px;text-align:left;font-size:11px;color:var(–text3);
font-weight:500;border-bottom:1px solid var(–border);background:rgba(255,255,255,.015);
letter-spacing:.03em;text-transform:uppercase;font-family:var(–mono);
}
.compare-table td{
padding:12px 16px;font-size:13px;color:var(–text2);
border-bottom:1px solid var(–border);transition:background .15s;
}
.compare-table tr:last-child td{border-bottom:none}
.compare-table tr:first-child td{color:#b8b0ff;font-weight:600;background:rgba(110,96,255,.04)}
.compare-table tr:hover td{background:rgba(255,255,255,.015)}

.reject-card{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;padding:18px 20px;margin-bottom:12px;
}
.reject-title{
font-size:12px;font-weight:600;color:var(–red);margin-bottom:14px;
display:flex;align-items:center;gap:7px;
}
.reject-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.reject-item:last-child{margin-bottom:0}
.reject-dot{
color:var(–red);margin-top:4px;flex-shrink:0;font-size:10px;
width:16px;height:16px;border-radius:50%;background:rgba(240,82,82,.08);
display:flex;align-items:center;justify-content:center;
}
.reject-text{font-size:13px;color:var(–text3);line-height:1.65}
.reject-name{color:var(–text2);font-weight:600}

.typing-wrap{
background:var(–bg-card);border:1px solid var(–border);
border-radius:16px;padding:22px;
}
.typing{display:flex;gap:6px;align-items:center}
.typing span{
width:6px;height:6px;border-radius:50%;
background:var(–accent);animation:pulse 1.2s ease-in-out infinite;opacity:.4;
}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes pulse{
0%,60%,100%{transform:translateY(0);opacity:.3}
30%{transform:translateY(-6px);opacity:1}
}

#fileInput{display:none}

@media(max-width:640px){
.hdr{padding:12px 16px;height:50px}
#landing{
padding-top:50px;min-height:0;
justify-content:flex-start;
padding-bottom:40px;
}
#welcome{margin-top:28px;margin-bottom:18px}
#welcome h2{font-size:22px}
#welcome p{font-size:13px}
.welcome-icon{font-size:36px;margin-bottom:10px}
#chips{padding:0 16px;gap:8px}
.chip{padding:8px 14px;font-size:12.5px}
.search-wrap{padding:0 16px}
.search-hint{font-size:10px}
#stickySearch{padding:10px 16px 8px;top:50px}
.content{padding:16px}
.pick-title{font-size:17px}
.compare-table th,.compare-table td{padding:9px 10px;font-size:11.5px}
}
</style>

</head>
<body>

<!-- HEADER -->

<div class="hdr">
  <div class="logo">
    <div class="logo-mark">T</div>
    <div>
      <div class="logo-name">This<span>One</span></div>
      <div class="logo-sub">구매결정 AI · 최선의 선택</div>
    </div>
  </div>
  <div class="badge">BETA</div>
</div>

<!-- LANDING -->

<div id="landing">
  <div id="welcome">
    <div class="welcome-icon">🎯</div>
    <h2>고민 끝. <em>This One.</em></h2>
    <p>리뷰, 배송, 평판까지 보고<br>AI가 최선의 선택을 찾아드립니다.</p>
  </div>

  <div class="search-wrap" id="landingSearch">
    <div class="search-box">
      <textarea class="msg-input" id="msgInput" placeholder="뭐 사면 될지 물어보세요" rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="img-btn" onclick="document.getElementById('fileInput').click()"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg></button>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
    </div>
    <div class="img-preview" id="imgPreview">
      <img class="pv-img" id="previewImg" src="" alt="">
      <span class="pv-name" id="previewName"></span>
      <button class="pv-del" onclick="removeImg()">✕</button>
    </div>
    <div class="search-hint">예: 맘카페 반응 좋은 유모차 &nbsp;·&nbsp; 배송비 포함 가장 합리적인 공기청정기</div>
  </div>

  <div id="chips">
    <div class="chip" onclick="quick('에어팟 프로 2세대')">🎧 에어팟 프로 2세대</div>
    <div class="chip" onclick="quick('배송비 포함 가장 나은 공기청정기')">💨 공기청정기</div>
    <div class="chip" onclick="quick('맘카페 반응 좋은 유모차')">🍼 맘카페 추천 유모차</div>
    <div class="chip" onclick="quick('회사에서 쓸 프린터 유지비까지 고려해서')">🖨️ 유지비 포함 프린터</div>
    <div class="chip" onclick="quick('30인치 산업용 선풍기 플라스틱 날개')">🌀 산업용 선풍기</div>
  </div>
</div>

<!-- STICKY SEARCH (검색 후) -->

<div id="stickySearch">
  <div class="search-box">
    <textarea class="msg-input" id="msgInput2" placeholder="다른 상품도 물어보세요" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="img-btn" onclick="document.getElementById('fileInput').click()">📷</button>
    <button class="send-btn" id="sendBtn2" onclick="sendMsg()">↑</button>
  </div>
  <div class="img-preview" id="imgPreview2">
    <img class="pv-img" id="previewImg2" src="" alt="">
    <span class="pv-name" id="previewName2"></span>
    <button class="pv-del" onclick="removeImg()">✕</button>
  </div>
</div>

<!-- RESULTS -->

<div class="content" id="content"></div>

<input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

<script>
const MODEL='claude-sonnet-4-20250514';
let pendingImg=null;
let loading=false;
let history=[];
let isSearchMode=false;

const PROMPT=`당신은 ThisOne 구매결정 AI입니다.
사용자가 상품을 물어보면 웹 검색으로 네이버 쇼핑, 쿠팡 등에서 실제 가격을 찾아 분석하고, 반드시 아래 JSON 형식으로만 답하세요. JSON 외 다른 텍스트 없이.

{
  "pick": "추천 상품명",
  "reasons": ["이유1(가격/배송)", "이유2(리뷰/평판)", "이유3(실용성)"],
  "compare": [
    {"name":"상품명","price":"가격","delivery":"배송","review":"⭐4.5"},
    {"name":"상품명","price":"가격","delivery":"배송","review":"⭐4.2"}
  ],
  "rejects": [
    {"name":"탈락상품명","reason":"탈락이유"}
  ]
}`;

function getInput(){return document.getElementById(isSearchMode?'msgInput2':'msgInput');}
function getSendBtn(){return document.getElementById(isSearchMode?'sendBtn2':'sendBtn');}

function switchToSearchMode(){
  if(isSearchMode)return;
  isSearchMode=true;
  document.getElementById('landing').style.display='none';
  document.getElementById('stickySearch').style.display='block';
  document.getElementById('content').style.display='block';
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}}
function quick(t){document.getElementById('msgInput').value=t;autoResize(document.getElementById('msgInput'));sendMsg();}

function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    pendingImg={data:ev.target.result.split(',')[1],src:ev.target.result};
    ['','2'].forEach(s=>{
      const el=document.getElementById('previewImg'+s);
      const nm=document.getElementById('previewName'+s);
      const pv=document.getElementById('imgPreview'+s);
      if(el)el.src=ev.target.result;
      if(nm)nm.textContent=file.name;
      if(pv)pv.classList.add('show');
    });
  };
  r.readAsDataURL(file);e.target.value='';
}
function removeImg(){
  pendingImg=null;
  ['','2'].forEach(s=>{
    const pv=document.getElementById('imgPreview'+s);
    if(pv)pv.classList.remove('show');
  });
}

async function sendMsg(){
  if(loading)return;
  const inp=getInput();
  const txt=inp.value.trim();
  if(!txt&&!pendingImg)return;

  switchToSearchMode();

  const uc=[];
  if(pendingImg)uc.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:pendingImg.data}});
  uc.push({type:'text',text:txt||'이 이미지 상품을 가격비교해줘'});

  addUserMsg(txt||'📷 이미지로 검색',pendingImg?.src);
  history.push({role:'user',content:uc});
  inp.value='';autoResize(inp);removeImg();

  loading=true;
  getSendBtn().disabled=true;
  const typingEl=addTyping();

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:1500,system:PROMPT,messages:history})
    });
    const data=await res.json();
    typingEl.remove();
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    history.push({role:'assistant',content:raw});
    try{
      const clean=raw.replace(/```json|```/g,'').trim();
      const j=JSON.parse(clean);
      addResultCard(j);
    }catch{
      addFallback(raw);
    }
  }catch(err){
    typingEl.remove();
    addFallback('검색 중 오류가 발생했습니다. 다시 시도해주세요.');
  }
  loading=false;
  getSendBtn().disabled=false;
  getInput().focus();
}

function addUserMsg(txt,imgSrc){
  const d=document.createElement('div');
  d.className='user-msg-wrap';
  d.innerHTML=`<div class="user-msg-label">🔍 검색</div>
    <div class="user-msg">${imgSrc?`<img src="${imgSrc}" style="max-width:160px;border-radius:8px;margin-bottom:8px;display:block;">`:''}${esc(txt)}</div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addResultCard(j){
  const d=document.createElement('div');
  d.className='ai-result';

  let html=`<div class="ai-label"><div class="dot">T</div> ThisOne 분석</div>`;

  html+=`<div class="pick-card">
    <div class="pick-badge">✅ 이거요</div>
    <div class="pick-title">${esc(j.pick)}</div>
    <div class="pick-reasons">`;
  (j.reasons||[]).forEach((r,i)=>{
    html+=`<div class="pick-reason"><div class="reason-num">${i+1}</div><div class="reason-text">${esc(r)}</div></div>`;
  });
  html+=`</div></div>`;

  if(j.compare&&j.compare.length){
    html+=`<div class="compare-card">
      <div class="compare-title">📊 비교</div>
      <table class="compare-table">
        <tr><th>상품</th><th>가격</th><th>배송</th><th>리뷰</th></tr>`;
    j.compare.forEach(c=>{
      html+=`<tr><td>${esc(c.name)}</td><td>${esc(c.price)}</td><td>${esc(c.delivery)}</td><td>${esc(c.review)}</td></tr>`;
    });
    html+=`</table></div>`;
  }

  if(j.rejects&&j.rejects.length){
    html+=`<div class="reject-card"><div class="reject-title">❌ 탈락 이유</div>`;
    j.rejects.forEach(r=>{
      html+=`<div class="reject-item"><div class="reject-dot">✕</div>
        <div class="reject-text"><span class="reject-name">${esc(r.name)}</span> — ${esc(r.reason)}</div></div>`;
    });
    html+=`</div>`;
  }

  d.innerHTML=html;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addFallback(txt){
  const d=document.createElement('div');
  d.className='ai-result';
  const fmt=txt.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  d.innerHTML=`<div class="ai-label"><div class="dot">T</div> ThisOne 분석</div>
    <div class="pick-card" style="border-color:var(--border)">${fmt}</div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addTyping(){
  const d=document.createElement('div');
  d.className='ai-result';
  d.innerHTML=`<div class="ai-label"><div class="dot">T</div> 검색 중...</div>
    <div class="typing-wrap"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('content').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

</body>
</html>
