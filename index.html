<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ThisOne" />
  <meta property="og:title" content="ThisOne - 추론형 가격비교 에이전트" />
  <meta name="theme-color" content="#ffffff" />
  <title>ThisOne - 추론형 가격비교 에이전트</title>
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body>
  <div class="hdr">
<div class="logo" onclick="goHome()">
  <img
    src="/assets/thisone-logo-rough.png"
    alt="ThisOne"
    class="logo-img"
  />
</div>
</div>

  <div id="landing">
    <div id="welcome">
      <h2>이것저것 보지 말고,<br>하나만 골라 잘 사자!</h2>
      <p>고민은 디스원, 만족은 당신께</p>
    </div>

    <div class="search-wrap" id="landingSearch">
      <div class="search-box">
        <textarea
          class="msg-input"
          id="msgInput"
          placeholder="어떤 게 제일 좋은지 찾아보세요"
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>

        <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>

        <button class="send-btn" id="sendBtn" type="button" onclick="sendMsg()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>
      <!-- 전문가 필터 버튼 -->
      <div class="filter-trigger" onclick="toggleFilterModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        전문가 설정
      </div>

      <div class="img-preview" id="imgPreview">
        <img class="pv-img" id="previewImg" src="" alt="">
        <span class="pv-name" id="previewName"></span>
        <button class="pv-del" type="button" onclick="removeImg()">✕</button>
      </div>

      <div class="search-hint">예: 맘카페 반응 좋은 유모차 · 배송비 포함 가장 합리적인 공기청정기</div>
    </div>

    <!-- 전문가 설정 모달 -->
    <div id="filterModal" class="modal-overlay" style="display:none;">
      <div class="modal-content">
        <div class="modal-header">
          <h3>전문가 검색 설정</h3>
          <button class="close-btn" onclick="toggleFilterModal()">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label>가격 범위 (원)</label>
            <div class="price-inputs">
              <input type="number" id="minPrice" placeholder="최소" />
              <span>~</span>
              <input type="number" id="maxPrice" placeholder="최대" />
            </div>
          </div>
          <div class="setting-group inline">
            <label><input type="checkbox" id="freeShipping"> 무료배송만</label>
            <label><input type="checkbox" id="domesticOnly"> 국내배송만</label>
          </div>
          <div class="setting-group inline">
            <label><input type="checkbox" id="excludeOverseas" checked> 해외직구 제외</label>
            <label><input type="checkbox" id="excludeUsed" checked> 중고/리퍼 제외</label>
          </div>
          <div class="setting-group inline">
            <label><input type="checkbox" id="includeRental" checked> 렌탈 상품 포함</label>
          </div>
        </div>
        <div class="modal-footer">
          <button class="save-btn" onclick="saveExpertSettings()">설정 저장</button>
        </div>
      </div>
    </div>

    <div id="chips">
      <!-- 트렌드 알고리즘에 의해 실시간으로 생성됩니다 -->
    </div>
  </div>

  <div id="stickySearch">
    <div class="search-box">
      <textarea
        class="msg-input"
        id="msgInput2"
        placeholder="다른 상품도 물어보세요"
        rows="1"
        oninput="autoResize(this)"
        onkeydown="handleKey(event)"
      ></textarea>

      <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>

      <button class="send-btn" id="sendBtn2" type="button" onclick="sendMsg()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </button>
    </div>

    <div class="img-preview" id="imgPreview2">
      <img class="pv-img" id="previewImg2" src="" alt="">
      <span class="pv-name" id="previewName2"></span>
      <button class="pv-del" type="button" onclick="removeImg()">✕</button>
    </div>
  </div>

  <div class="content" id="content"></div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

  <script src="/js/trajectoryLogger.js" defer></script>
  <script src="/js/api.js" defer></script>
  <script src="/js/ui.js" defer></script>
  <script src="/js/productFamilies.js" defer></script>
  <script src="/js/ranking.js" defer></script>
  <script src="/js/app.js" defer></script>
</body>
</html>
