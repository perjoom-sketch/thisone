<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ThisOne">
<meta property="og:title" content="ThisOne - AI 가격비교 에이전트">
<meta name="theme-color" content="#0a0e1a">
<title>ThisOne</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700;900&family=Share+Tech+Mono&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{
  background:#0a0e1a;color:#e2e8f0;
  font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 0%, rgba(99,102,241,.1) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(16,185,129,.07) 0%, transparent 55%);
}

/* HEADER */
.hdr{
padding:14px 16px 12px;
display:flex;align-items:center;justify-content:space-between;
border-bottom:1px solid rgba(255,255,255,.06);
background:rgba(10,14,26,.9);backdrop-filter:blur(20px);
position:sticky;top:0;z-index:100;
}
.logo{display:flex;align-items:center;gap:8px;}
.logo-mark{
width:32px;height:32px;border-radius:8px;
background:linear-gradient(135deg,#6366f1,#06b6d4);
display:flex;align-items:center;justify-content:center;
font-size:16px;font-weight:900;color:#fff;
box-shadow:0 0 16px rgba(99,102,241,.4);
}
.logo-text{font-size:18px;font-weight:900;color:#fff;letter-spacing:-.02em;}
.logo-text span{color:#6366f1;}
.hdr-sub{font-size:10px;color:#475569;font-family:‘Share Tech Mono’,monospace;margin-top:1px;}
.badge{
background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);
border-radius:20px;padding:4px 10px;font-size:10px;color:#818cf8;
font-family:‘Share Tech Mono’,monospace;
}

/* SEARCH BAR - 상단 고정 */
.search-wrap{
padding:14px 14px 10px;
background:rgba(10,14,26,.8);backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.06);
position:sticky;top:57px;z-index:99;
}
.search-box{
background:rgba(255,255,255,.07);
border:2px solid rgba(255,255,255,.45);box-shadow:0 0 0 3px rgba(99,102,241,.15),0 4px 20px rgba(0,0,0,.4);
border-radius:14px;
display:flex;align-items:flex-end;
padding:6px 6px 6px 14px;
gap:6px;
transition:border-color .2s;
}
.search-box:focus-within{border-color:rgba(99,102,241,.6);box-shadow:0 0 0 3px rgba(99,102,241,.1);}
#msgInput{
flex:1;background:none;border:none;outline:none;
font-family:‘Noto Sans KR’,sans-serif;font-size:16px;color:#e2e8f0;
padding:8px 0;resize:none;max-height:120px;line-height:1.6;
}
#msgInput::placeholder{color:#8892aa;font-size:15px;}
.img-btn{
width:36px;height:36px;border-radius:9px;border:none;
background:rgba(255,255,255,.07);color:#64748b;
font-size:18px;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
transition:all .15s;-webkit-tap-highlight-color:transparent;
}
.img-btn:active{background:rgba(99,102,241,.2);color:#818cf8;}
.send-btn{
width:44px;height:44px;border-radius:11px;border:none;
background:linear-gradient(135deg,#6366f1,#4f46e5);
color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;
display:flex;align-items:center;justify-content:center;
transition:all .15s;-webkit-tap-highlight-color:transparent;
box-shadow:0 0 24px rgba(99,102,241,.6),0 0 8px rgba(99,102,241,.4);
}
.send-btn:active{transform:scale(.92);}
.send-btn:disabled{background:rgba(99,102,241,.3);box-shadow:none;}

/* 이미지 미리보기 */
.img-preview{
margin-top:8px;
background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);
border-radius:9px;padding:7px 10px;
display:flex;align-items:center;gap:8px;
}
.img-preview.hidden{display:none;}
.pv-img{width:36px;height:36px;border-radius:6px;object-fit:cover;}
.pv-name{font-size:11px;color:#818cf8;flex:1;}
.pv-del{background:none;border:none;color:#475569;font-size:16px;cursor:pointer;}

/* 빠른 검색 칩 */
.chips-wrap{padding:10px 14px 0;display:flex;gap:7px;overflow-x:auto;padding-bottom:8px;background:#0a0e1a;}
.chips-wrap::-webkit-scrollbar{display:none;}
.chip{
background:rgba(99,102,241,.1);border:1px solid rgba(99,102,241,.2);
border-radius:20px;padding:6px 13px;font-size:12px;color:#a5b4fc;
cursor:pointer;white-space:nowrap;transition:all .15s;
-webkit-tap-highlight-color:transparent;flex-shrink:0;
}
.chip:active{background:rgba(99,102,241,.25);}

/* CONTENT */
.content{padding:16px 14px 40px;background:#0a0e1a;min-height:100vh;}

/* WELCOME */
.welcome{text-align:center;padding:20px 20px;background:#0a0e1a;}
.welcome-icon{font-size:48px;margin-bottom:10px;}
.welcome h2{font-size:28px;font-weight:900;color:#fff;margin-bottom:10px;letter-spacing:-.02em;}
.welcome p{font-size:13px;color:#64748b;line-height:1.75;}

/* MESSAGES */
.msg{margin-bottom:20px;}
.msg-label{
font-size:11px;color:#475569;margin-bottom:8px;
display:flex;align-items:center;gap:6px;
font-family:‘Share Tech Mono’,monospace;letter-spacing:.04em;
}
.msg-label .dot{
width:20px;height:20px;border-radius:50%;
display:flex;align-items:center;justify-content:center;font-size:11px;
}
.msg.user .msg-label .dot{background:rgba(255,255,255,.1);}
.msg.ai .msg-label .dot{background:linear-gradient(135deg,#6366f1,#06b6d4);font-size:10px;font-weight:900;color:#fff;}
.msg-body{
font-size:14px;line-height:1.75;color:#e2e8f0;
}
.msg.user .msg-body{
background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.2);
border-radius:12px;border-top-left-radius:4px;
padding:12px 14px;
}
.msg.ai .msg-body{
background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);
border-radius:12px;border-top-left-radius:4px;
padding:14px 16px;
}
.msg-img-preview{
max-width:180px;border-radius:10px;margin-bottom:8px;display:block;
}

/* TYPING */
.typing{display:flex;gap:5px;align-items:center;padding:6px 0;}
.typing span{
width:7px;height:7px;border-radius:50%;background:#6366f1;
animation:bounce .8s infinite;
}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

#fileInput{display:none;}
.search-hint{font-size:11px;color:#475569;margin-top:7px;padding:0 4px;line-height:1.5;}

/* 결과 카드 */
.result-card{
background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(6,182,212,.08));
border:1.5px solid rgba(99,102,241,.35);
border-radius:14px;padding:16px;margin-top:12px;
}
.rc-badge{
display:inline-block;background:#6366f1;color:#fff;
font-size:10px;font-weight:700;border-radius:6px;
padding:3px 8px;margin-bottom:10px;letter-spacing:.04em;
}
.rc-title{font-size:15px;font-weight:900;color:#fff;margin-bottom:12px;line-height:1.4;}
.rc-reasons{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
.rc-reason{display:flex;gap:8px;font-size:13px;color:#cbd5e1;line-height:1.5;}
.rc-reason .icon{flex-shrink:0;}
.rc-divider{height:1px;background:rgba(255,255,255,.08);margin:12px 0;}
.rc-losers{font-size:12px;color:#64748b;line-height:1.6;}
.rc-losers strong{color:#94a3b8;}
</style>

</head>
<body>

<div class="hdr">
  <div class="logo">
    <div class="logo-mark">T</div>
    <div>
      <div class="logo-text">This<span>One</span></div>
      <div class="hdr-sub">구매결정 AI · 최선의 선택</div>
    </div>
  </div>
  <div class="badge">BETA</div>
</div>

<!-- 검색창 상단 고정 -->

<div class="search-wrap">
  <div class="search-box">
    <textarea id="msgInput" placeholder="뭐 사면 될지 물어보세요" rows="1"
      oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="img-btn" onclick="document.getElementById('fileInput').click()" title="이미지 검색">📷</button>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
  </div>
  <div class="img-preview hidden" id="imgPreview">
    <img class="pv-img" id="previewImg" src="" alt="">
    <span class="pv-name" id="previewName"></span>
    <button class="pv-del" onclick="removeImage()">✕</button>
  </div>
  <div class="search-hint">예: 맘카페 반응 좋은 유모차 &nbsp;·&nbsp; 배송비 포함 가장 합리적인 공기청정기</div>
</div>

<!-- 빠른 검색 -->

<div class="chips-wrap" id="chipsWrap">
  <div class="chip" onclick="quickSearch('에어팟 프로 2세대')">🎧 에어팟 프로 2세대</div>
  <div class="chip" onclick="quickSearch('배송비 포함 가장 나은 공기청정기')">💨 배송비 포함 공기청정기</div>
  <div class="chip" onclick="quickSearch('맘카페 반응 좋은 유모차')">🍼 맘카페 추천 유모차</div>
  <div class="chip" onclick="quickSearch('회사에서 쓸 프린터 유지비까지 고려해서')">🖨️ 유지비 포함 프린터</div>
  <div class="chip" onclick="quickSearch('30인치 산업용 선풍기 플라스틱 날개')">🌀 산업용 선풍기 30인치</div>
  <div class="chip" onclick="quickSearch('에어팟 프로 2세대')">🎧 에어팟 프로 2세대</div>
  <div class="chip" onclick="quickSearch('다이슨 청소기 추천')">🧹 다이슨 청소기</div>
  <div class="chip" onclick="quickSearch('삼성 65인치 QLED TV')">📺 삼성 65인치 TV</div>
  <div class="chip" onclick="quickSearch('아이패드 프로 추천')">📱 아이패드 프로</div>
</div>

<!-- 컨텐츠 -->

<div class="content" id="content">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">🎯</div>
    <h2>고민 끝. This One.</h2>
    <p>리뷰, 배송, 평판까지 보고<br>AI가 최선의 선택을 찾아드립니다.</p>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*" onchange="handleImage(event)">

<script>
const CLAUDE_MODEL = 'claude-sonnet-4-20250514';
let pendingImage = null;
let isLoading = false;
let conversationHistory = [];

const SYSTEM_PROMPT = `당신은 ThisOne 구매결정 AI입니다.
사용자가 상품을 물어보면 웹 검색으로 네이버 쇼핑, 쿠팡, G마켓 등에서 실제 가격과 정보를 찾아 분석하고, 반드시 아래 형식으로 답하세요.

---
## ✅ 이거요 — [추천 상품명]

**추천 이유 3가지:**
1. [이유 1 — 가격/배송 관련]
2. [이유 2 — 리뷰/평판 관련]
3. [이유 3 — 실용성/가성비 관련]

---
## 📊 비교

| 상품 | 가격 | 배송 | 리뷰 |
|------|------|------|------|
| 추천 상품 | X원 | 무료 | ⭐X.X |
| 비교 상품 | X원 | X원 | ⭐X.X |

---
## ❌ 탈락 이유

- [탈락 상품명]: [탈락 이유 한 줄]

---

항상 한국어로 답하고, 실제 검색 데이터 기반으로 구체적 가격을 제시하세요.
이미지가 제공되면 상품을 먼저 파악하고 위 형식으로 답하세요.`;

function autoResize(el){
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
}
function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
}
function quickSearch(text){
  document.getElementById('msgInput').value=text;
  autoResize(document.getElementById('msgInput'));
  sendMessage();
}
function handleImage(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    pendingImage={data:ev.target.result.split(',')[1], src:ev.target.result};
    document.getElementById('previewImg').src=ev.target.result;
    document.getElementById('previewName').textContent=file.name;
    document.getElementById('imgPreview').classList.remove('hidden');
  };
  reader.readAsDataURL(file);
  e.target.value='';
}
function removeImage(){
  pendingImage=null;
  document.getElementById('imgPreview').classList.add('hidden');
}

async function sendMessage(){
  if(isLoading) return;
  const input=document.getElementById('msgInput');
  const text=input.value.trim();
  if(!text&&!pendingImage) return;

  document.getElementById('welcome')?.remove();
  document.getElementById('chipsWrap').style.display='none';

  const userContent=[];
  let displayText=text||'📷 이미지로 검색';

  if(pendingImage){
    userContent.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:pendingImage.data}});
  }
  if(text) userContent.push({type:'text',text});
  else userContent.push({type:'text',text:'이 이미지의 상품을 찾아서 가격비교 해주세요.'});

  addUserMsg(displayText, pendingImage?.src);
  conversationHistory.push({role:'user',content:userContent});

  input.value=''; autoResize(input);
  removeImage();

  isLoading=true;
  document.getElementById('sendBtn').disabled=true;
  const typingEl=addTyping();

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:CLAUDE_MODEL,
        max_tokens:1500,
        system:SYSTEM_PROMPT,
        messages:conversationHistory
      })
    });
    const data=await res.json();
    typingEl.remove();
    const reply=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    conversationHistory.push({role:'assistant',content:reply});
    addAiMsg(reply);
  }catch(err){
    typingEl.remove();
    addAiMsg('검색 중 오류가 발생했습니다. 다시 시도해주세요.');
  }
  isLoading=false;
  document.getElementById('sendBtn').disabled=false;
}

function addUserMsg(text, imgSrc){
  const div=document.createElement('div');
  div.className='msg user';
  let html=`<div class="msg-label"><div class="dot">👤</div> 검색</div><div class="msg-body">`;
  if(imgSrc) html+=`<img class="msg-img-preview" src="${imgSrc}">`;
  html+=`${escHtml(text)}</div>`;
  div.innerHTML=html;
  document.getElementById('content').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function addAiMsg(text){
  const div=document.createElement('div');
  div.className='msg ai';
  const formatted=text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
  div.innerHTML=`<div class="msg-label"><div class="dot">T</div> ThisOne 분석</div><div class="msg-body">${formatted}</div>`;
  document.getElementById('content').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function addTyping(){
  const div=document.createElement('div');
  div.className='msg ai';
  div.innerHTML=`<div class="msg-label"><div class="dot">T</div> 검색 중...</div>
    <div class="msg-body"><div class="typing"><span></span><span></span><span></span></div></div>`;
  document.getElementById('content').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
  return div;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

</body>
</html>
