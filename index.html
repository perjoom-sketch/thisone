<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ThisOne" />
  <meta property="og:title" content="ThisOne - 추론형 가격비교 에이전트" />
  <meta name="theme-color" content="#ffffff" />
  <title>ThisOne - 추론형 가격비교 에이전트</title>
  <link rel="stylesheet" href="/styles/main.css" />
  </head>
<body>
  <div class="hdr">
    <div class="logo" onclick="goHome()">
      <div class="logo-mark">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#4f46e5"></stop>
              <stop offset="1" stop-color="#0d9488"></stop>
            </linearGradient>
          </defs>
          <circle cx="12" cy="12" r="7" stroke="url(#lg)" stroke-width="1.8" fill="none" opacity=".5"></circle>
          <circle cx="12" cy="12" r="2" fill="url(#lg)"></circle>
          <line x1="12" y1="1" x2="12" y2="5" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round"></line>
          <line x1="12" y1="19" x2="12" y2="23" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round"></line>
          <line x1="1" y1="12" x2="5" y2="12" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round"></line>
          <line x1="19" y1="12" x2="23" y2="12" stroke="url(#lg)" stroke-width="1.8" stroke-linecap="round"></line>
        </svg>
      </div>
      <div>
        <div class="logo-name">This<span>One</span></div>
        <div class="logo-sub">추론형 가격비교 에이전트</div>
      </div>
    </div>
    <div class="badge">BETA</div>
  </div>

  <div id="landing">
    <div id="welcome">
      <div class="welcome-icon">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="glow" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
              <stop stop-color="#6366f1"></stop>
              <stop offset="1" stop-color="#06b6d4"></stop>
            </linearGradient>
            <radialGradient id="center-glow" cx="32" cy="32" r="16" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a5b4fc" stop-opacity=".6"></stop>
              <stop offset="1" stop-color="#6366f1" stop-opacity="0"></stop>
            </radialGradient>
          </defs>
          <circle cx="32" cy="32" r="22" stroke="url(#glow)" stroke-width="3" fill="none" opacity=".35"></circle>
          <circle cx="32" cy="32" r="14" stroke="url(#glow)" stroke-width="2.5" fill="none" opacity=".6"></circle>
          <circle cx="32" cy="32" r="12" fill="url(#center-glow)"></circle>
          <circle cx="32" cy="32" r="4" fill="url(#glow)"></circle>
          <line x1="32" y1="4" x2="32" y2="16" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity=".7"></line>
          <line x1="32" y1="48" x2="32" y2="60" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity=".7"></line>
          <line x1="4" y1="32" x2="16" y2="32" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity=".7"></line>
          <line x1="48" y1="32" x2="60" y2="32" stroke="url(#glow)" stroke-width="2.5" stroke-linecap="round" opacity=".7"></line>
        </svg>
      </div>
      <h2>고민 끝. <em>This One.</em></h2>
      <p>구매결정을 도와주는 디스원<br>판매방식, 추가비용, 실사용 후기를 분석해<br>더 나은 선택을 추천합니다.</p>
    </div>

    <div class="search-wrap" id="landingSearch">
      <div class="search-box">
        <textarea class="msg-input" id="msgInput" placeholder="뭐 사면 될지 물어보세요" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
            <circle cx="12" cy="13" r="4"></circle>
          </svg>
        </button>
        <button class="send-btn" id="sendBtn" type="button" onclick="sendMsg()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
        </button>
      </div>

      <div class="img-preview" id="imgPreview">
        <img class="pv-img" id="previewImg" src="" alt="">
        <span class="pv-name" id="previewName"></span>
        <button class="pv-del" type="button" onclick="removeImg()">✕</button>
      </div>

      <div class="search-hint">예: 맘카페 반응 좋은 유모차 · 배송비 포함 가장 합리적인 공기청정기</div>
    </div>

    <div id="chips">
      <div class="chip" onclick="quick('에어팟 프로 2세대')">🎧 에어팟 프로 2세대</div>
      <div class="chip" onclick="quick('배송비 포함 가장 나은 공기청정기')">💨 공기청정기</div>
      <div class="chip" onclick="quick('맘카페 반응 좋은 유모차')">🍼 맘카페 추천 유모차</div>
      <div class="chip" onclick="quick('회사에서 쓸 프린터 유지비까지 고려해서')">🖨️ 유지비 포함 프린터</div>
      <div class="chip" onclick="quick('30인치 산업용 선풍기 플라스틱 날개')">🌀 산업용 선풍기</div>
    </div>
  </div>

  <div id="stickySearch">
    <div class="search-box">
      <textarea class="msg-input" id="msgInput2" placeholder="다른 상품도 물어보세요" rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()">
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
          <circle cx="12" cy="13" r="4"></circle>
        </svg>
      </button>
      <button class="send-btn" id="sendBtn2" type="button" onclick="sendMsg()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
        </svg>
      </button>
    </div>

    <div class="img-preview" id="imgPreview2">
      <img class="pv-img" id="previewImg2" src="" alt="">
      <span class="pv-name" id="previewName2"></span>
      <button class="pv-del" type="button" onclick="removeImg()">✕</button>
    </div>
  </div>

  <div class="content" id="content"></div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">
<script src="/js/api.js" defer></script>
<script src="/js/ui.js" defer></script>
<script src="/js/app.js" defer></script>  
</body>
</html>
