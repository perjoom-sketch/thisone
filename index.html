<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  
  <script>
    console.log("%c [ThisOne] v3.1.0 Loaded (Structure Refactor) - " + new Date().toLocaleString(), "color: #3b82f6; font-weight: bold;");
    
    // [Global] 전역 변수 정의
    window.NOEL = window.NOEL || 'gemini-2.0-flash';
    window.MINI_SCOPE = window.MINI_SCOPE || '✦';
    window.MINI_SCOPE_AI = window.MINI_SCOPE_AI || '✧';
    
    var currentQuery = '';
    
    // 검색 상태 관리
    const SearchState = {
      isSearching: false,
      start() {
        this.isSearching = true;
        document.body.classList.add('search-mode');
      },
      end() {
        this.isSearching = false;
        document.body.classList.remove('search-mode');
      }
    };
    
    // 설정창 토글
    window.toggleFilterModal = function() {
      const target = document.getElementById('filterModal');
      if (!target) return;
      
      const isHidden = target.style.display === 'none' || target.style.display === '';
      target.style.display = isHidden ? 'block' : 'none';
    };
  </script>
  
  <meta name="apple-mobile-web-app-title" content="ThisOne" />
  <meta property="og:title" content="지능형 쇼핑 디스원" />
  <meta name="description" content="이것저것 찾지 말고, 하나만 잘 고르자! 쇼핑 자율주행의 시작. 세상에 단 하나뿐인 지능형 가격비교 엔진, 디스원." />
  <meta name="theme-color" content="#ffffff" />
  <title>지능형 쇼핑 디스원</title>
  
  <link rel="stylesheet" href="/styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
  
  <style>
    /* 모달 오버레이 */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(15, 23, 42, 0.4);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: var(--z-modal);
    }
    
    .modal-content {
      background: #fff;
      border-radius: 24px;
      padding: 32px;
      width: 90%;
      max-width: 600px;
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 20px 50px rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.3);
    }
    
    .close-btn {
      background: #f1f5f9;
      border: none;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>

<body>
  <!-- 헤더 -->
  <header class="app-header">
    <div class="header-content">
      <a href="/" class="logo" onclick="event.preventDefault(); goHome();">
        <img src="/assets/thisone-logo-rough.png" alt="ThisOne" class="logo-img" />
        <div class="logo-text">
          <span class="slogan">고민은 디스원, 만족은 당신꺼</span>
        </div>
      </a>
    </div>
  </header>

  <!-- 메인 콘텐츠 -->
  <main class="app-main">
    
    <!-- 랜딩 페이지 (검색 전) -->
    <section class="landing-view" id="landing">
      <div id="welcome">
        <h2 class="rounded-headline">이것저것 찾지 말고,<br><span class="point-text">하나만</span> 잘 고르자!</h2>
      </div>

      <!-- 검색 입력 영역 -->
      <div class="search-wrap" id="landingSearch">
        <div class="search-box">
          <div class="img-preview" id="imgPreview">
            <div class="pv-item">
              <img class="pv-img" id="previewImg" src="" alt="">
              <button class="pv-del" type="button" onclick="removeImg()">✕</button>
            </div>
          </div>

          <div class="input-row">
            <textarea
              class="msg-input"
              id="msgInput"
              placeholder="검색어 입력 또는 이미지 붙여넣기(Ctrl+V)..."
              rows="1"
              oninput="autoResize(this)"
              onkeydown="handleKey(event)"
            ></textarea>

            <div class="footer-right">
              <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()" title="이미지 업로드">
                <span class="new-badge">NEW</span>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
              </button>

              <button class="send-btn" id="sendBtn" type="button" onclick="sendMsg()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="11" cy="11" r="7"></circle>
                  <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- 검색 힌트 -->
      <div class="search-hint" style="margin-top: 8px; opacity: 0.8; font-size: 13px;">예: 맘카페 반응 좋은 유모차 · 배송비 포함 가장 합리적인 공기청정기</div>
      
      <!-- 설정 버튼 -->
      <div class="settings-trigger" onclick="window.toggleFilterModal()" style="margin-top: 16px; text-align: center;">
        <button type="button" style="background: none; border: none; cursor: pointer; color: #64748b; font-size: 13px; font-weight: 600;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline; margin-right: 4px; vertical-align: -2px;">
            <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon>
          </svg>
          검색설정
        </button>
      </div>

      <!-- 트렌딩 섹션 -->
      <div class="trending-section" style="margin-top: 32px; text-align: center;">
        <div class="trending-label" style="font-size: 13px; font-weight: 700; color: #94a3b8; margin-bottom: 12px;">추천 검색어</div>
        <div id="trendingList" style="display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;">
          <!-- JS에서 동적 생성 -->
        </div>
      </div>
    </section>

    <!-- 검색 결과 페이지 (검색 후) -->
    <section class="results-view" id="resultsContainer">
      <div id="msgContainer"></div>
    </section>
  </main>

  <!-- 푸터 -->
  <footer class="app-footer">
    <div class="ftr-content">
      <a href="/" class="ftr-logo">ThisOne</a>
      <button type="button" onclick="window.ThisOneUI.openInquiryBoard()" style="background: none; border: none; color: #64748b; font-size: 13px; cursor: pointer;">문의하기</button>
    </div>
  </footer>

  <!-- 설정 모달 -->
  <div class="modal-overlay" id="filterModal" style="display: none;">
    <div class="modal-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h3 style="margin: 0; font-size: 18px; color: #1e293b;">검색설정</h3>
        <button class="close-btn" onclick="window.toggleFilterModal()">✕</button>
      </div>
      <div id="commonFilterContent"></div>
    </div>
  </div>

  <!-- 문의 게시판 모달 -->
  <div id="inquiryModal" class="modal-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.5); backdrop-filter:blur(10px); z-index:var(--z-modal); align-items:center; justify-content:center;">
    <div class="modal-content" style="background:#fff; border-radius:28px; padding:40px; width:95%; max-width:800px; max-height:85vh; overflow-y:auto; box-shadow:0 25px 50px -12px rgba(0,0,0,0.25); border:1px solid #e2e8f0; display:flex; flex-direction:column;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
        <h3 style="margin:0; font-size:22px; font-weight:800; color:#0f172a;">📋 고객지원 센터</h3>
        <button class="close-btn" onclick="window.ThisOneUI.closeInquiryBoard()">✕</button>
      </div>
      
      <div id="inquiryListArea">
        <div style="display:flex; justify-content:flex-end; margin-bottom:16px;">
          <button style="background:#3b82f6; color:#fff; border:none; padding:12px 24px; border-radius:14px; font-weight:700; cursor:pointer; box-shadow:0 4px 12px rgba(59,130,246,0.3);" onclick="window.ThisOneUI.showInquiryForm()">✍️ 문의하기</button>
        </div>
        <div id="inquiryList" style="margin-top:10px;">
          <div style="text-align:center; padding:40px; color:#94a3b8; font-size:14px;">목록을 불러오는 중...</div>
        </div>
      </div>

      <div id="inquiryFormArea" style="display:none;">
        <div style="margin-bottom:20px;">
          <label style="display:block; margin-bottom:10px; font-weight:700; font-size:14px; color:#334155;">제목</label>
          <input type="text" id="inqTitle" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:12px; font-size:15px; outline:none; box-sizing:border-box;" placeholder="제목을 입력하세요">
        </div>
        <div style="margin-bottom:20px;">
          <label style="display:block; margin-bottom:10px; font-weight:700; font-size:14px; color:#334155;">비밀번호</label>
          <input type="password" id="inqPassword" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:12px; font-size:15px; outline:none; box-sizing:border-box;" placeholder="4자리 이상 입력">
        </div>
        <div style="margin-bottom:24px;">
          <label style="display:block; margin-bottom:10px; font-weight:700; font-size:14px; color:#334155;">내용</label>
          <textarea id="inqContent" style="width:100%; padding:14px; border:1px solid #cbd5e1; border-radius:12px; font-size:15px; outline:none; resize:none; box-sizing:border-box;" rows="5" placeholder="궁금하신 내용을 남겨주세요"></textarea>
        </div>
        <div style="display:flex; gap:12px; justify-content:flex-end;">
          <button style="background:#f1f5f9; color:#475569; border:none; padding:12px 24px; border-radius:12px; font-weight:600; cursor:pointer;" onclick="window.ThisOneUI.hideInquiryForm()">취소</button>
          <button id="inqSubmitBtn" style="background:#3b82f6; color:#fff; border:none; padding:12px 24px; border-radius:12px; font-weight:600; cursor:pointer;" onclick="window.ThisOneUI.submitInquiry()">등록하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 이미지 업로드 입력 (숨김) -->
  <input type="file" id="fileInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">

  <!-- 설정 템플릿 -->
  <template id="filterTemplateV2">
    <div class="filter-modal-content" style="padding:16px; background:#fff; font-family:inherit;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
        <div style="display:flex; align-items:center; gap:6px; font-weight:800; color:#1e293b; font-size:15px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          <span>검색설정</span>
        </div>
      </div>

      <!-- 가격 범위 -->
      <div style="margin-bottom:12px;">
        <label style="display:block; font-size:11px; font-weight:700; color:#64748b; margin-bottom:6px;">가격 범위</label>
        <div style="display:flex; align-items:center; gap:4px;">
          <input type="number" id="minPrice" placeholder="최소" style="width:100%; padding:9px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; box-sizing:border-box;">
          <span style="color:#cbd5e1;">-</span>
          <input type="number" id="maxPrice" placeholder="최대" style="width:100%; padding:9px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; box-sizing:border-box;">
        </div>
      </div>

      <!-- 추천수 + 체크박스 2개 -->
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-bottom:10px;">
        <select id="resultCount" style="width:100%; padding:8px; border:1px solid #e2e8f0; border-radius:8px; font-size:12px; background:#f8fafc; height:35px; font-weight:600; box-sizing:border-box;">
          <option value="3">3개 이하</option>
          <option value="5" selected>5개 이하</option>
          <option value="10">10개 이하</option>
        </select>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:#334155; font-weight:600; background:#f8fafc; padding:0 4px; border-radius:8px; justify-content:center; border:1px solid #f1f5f9; box-sizing:border-box;">
          <input type="checkbox" id="freeShipping" style="width:14px; height:14px;"> 무료배송
        </label>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:#334155; font-weight:600; background:#f8fafc; padding:0 4px; border-radius:8px; justify-content:center; border:1px solid #f1f5f9; box-sizing:border-box;">
          <input type="checkbox" id="excludeOverseas" style="width:14px; height:14px;"> 직구제외
        </label>
      </div>

      <!-- 체크박스 3개 -->
      <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; margin-bottom:16px;">
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:#334155; font-weight:600; background:#f8fafc; padding:8px 4px; border-radius:8px; justify-content:center; border:1px solid #f1f5f9; box-sizing:border-box;">
          <input type="checkbox" id="excludeAgent" style="width:14px; height:14px;"> 대형제외
        </label>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:#334155; font-weight:600; background:#f8fafc; padding:8px 4px; border-radius:8px; justify-content:center; border:1px solid #f1f5f9; box-sizing:border-box;">
          <input type="checkbox" id="excludeUsed" style="width:14px; height:14px;"> 중고/리퍼제외
        </label>
        <label style="display:flex; align-items:center; gap:5px; cursor:pointer; font-size:11px; color:#334155; font-weight:600; background:#f8fafc; padding:8px 4px; border-radius:8px; justify-content:center; border:1px solid #f1f5f9; box-sizing:border-box;">
          <input type="checkbox" id="excludeRental" style="width:14px; height:14px;"> 렌탈제외
        </label>
      </div>

      <!-- 검색시간 슬라이더 + 저장 버튼 -->
      <div style="display:flex; align-items: flex-end; gap:12px; border-top:1px solid #f1f5f9; padding-top:12px;">
        <div style="flex:1;">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
            <label style="font-size:11px; font-weight:700; color:#64748b;">검색시간</label>
            <span id="patienceVal" style="font-size:11px; font-weight:800; color:#3b82f6;">20초</span>
          </div>
          <input type="range" id="patienceTime" min="5" max="60" value="20" style="width:100%; cursor:pointer; accent-color:#3b82f6; height:5px;" oninput="document.getElementById('patienceVal').textContent=this.value+'초'">
          <div style="display:flex; justify-content:space-between; margin-top:4px; font-size:9px; color:#94a3b8; font-weight:600;">
            <span>빠른검색</span>
            <span>심층검색</span>
          </div>
        </div>
        <button type="button" onclick="saveExpertSettings()" style="width:70px; height:40px; background:#0f172a; color:#fff; border:none; border-radius:10px; font-weight:800; font-size:14px; cursor:pointer; flex-shrink:0; box-shadow:0 4px 10px rgba(15,23,42,0.2);">저장</button>
      </div>
    </div>
  </template>

  <!-- JavaScript 스크립트 -->
  <script src="/js/trajectoryLogger.js?v=3.1.0" defer></script>
  <script src="/js/api.js?v=3.1.0"></script>
  <script src="/js/productFamilies.js?v=3.1.0"></script>
  <script src="/js/ranking.js?v=3.1.0"></script>
  <script src="/js/thisone_ui_v3.js?v=3.1.0"></script>
  <script src="/js/thisone_app_v3_final.js?v=3.1.0"></script>
</body>
</html>
