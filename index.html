<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  
  <script>
    console.log("%c [ThisOne] v3.4.5 Loaded (Modern Theme) - " + new Date().toLocaleString(), "color: #2563eb; font-weight: bold;");
    window.THISONE_ASSET_VERSION = '3.4.5';
    
    window.MODEL = window.MODEL || 'gemini-2.5-flash';
    window.NOEL = window.NOEL || window.MODEL;
    window.MINI_SCOPE = window.MINI_SCOPE || '✦';
    window.MINI_SCOPE_AI = window.MINI_SCOPE_AI || '✧';
    
    var currentQuery = '';

    // ThisOne 원칙: 검색설정은 새로고침 시 초기화한다.
    // 과거 반쪽 구현으로 남은 localStorage 값은 모바일 검색을 막을 수 있으므로 즉시 제거한다.
    try { localStorage.removeItem('thisone_expert_settings'); } catch (e) {}

    const DEFAULT_EXPERT_SETTINGS = {
      minPrice: '',
      maxPrice: '',
      resultCount: '5',
      freeShipping: true,
      excludeOverseas: false,
      excludeAgent: false,
      excludeUsed: false,
      excludeRental: false,
      patienceTime: '20'
    };

    window.ThisOneExpertSettings = { ...DEFAULT_EXPERT_SETTINGS };

    function applyExpertSettingsToForm(root) {
      if (!root) return;
      const settings = window.ThisOneExpertSettings || DEFAULT_EXPERT_SETTINGS;
      const setValue = (id, value) => {
        const el = root.querySelector('#' + id);
        if (el) el.value = value;
      };
      const setChecked = (id, value) => {
        const el = root.querySelector('#' + id);
        if (el) el.checked = !!value;
      };

      setValue('minPrice', settings.minPrice || '');
      setValue('maxPrice', settings.maxPrice || '');
      setValue('resultCount', settings.resultCount || '5');
      setChecked('freeShipping', settings.freeShipping);
      setChecked('excludeOverseas', settings.excludeOverseas);
      setChecked('excludeAgent', settings.excludeAgent);
      setChecked('excludeUsed', settings.excludeUsed);
      setChecked('excludeRental', settings.excludeRental);
      setValue('patienceTime', settings.patienceTime || '20');

      const range = root.querySelector('#patienceTime');
      const val = root.querySelector('#patienceVal');
      if (range && val) val.textContent = range.value + '초';
    }

    function readExpertSettingsFromForm(root) {
      if (!root) return window.ThisOneExpertSettings || DEFAULT_EXPERT_SETTINGS;
      const getValue = (id) => root.querySelector('#' + id)?.value || '';
      const getChecked = (id) => !!root.querySelector('#' + id)?.checked;
      return {
        minPrice: getValue('minPrice'),
        maxPrice: getValue('maxPrice'),
        resultCount: getValue('resultCount') || '5',
        freeShipping: getChecked('freeShipping'),
        excludeOverseas: getChecked('excludeOverseas'),
        excludeAgent: getChecked('excludeAgent'),
        excludeUsed: getChecked('excludeUsed'),
        excludeRental: getChecked('excludeRental'),
        patienceTime: getValue('patienceTime') || '20'
      };
    }

    function syncExpertSettingsFromForm(root) {
      if (!root) return;
      window.ThisOneExpertSettings = readExpertSettingsFromForm(root);
      try { localStorage.removeItem('thisone_expert_settings'); } catch (e) {}
    }

    function bindExpertSettingsLiveSync(root) {
      if (!root || root.dataset.liveSyncBound === 'true') return;
      root.dataset.liveSyncBound = 'true';
      root.addEventListener('input', () => syncExpertSettingsFromForm(root));
      root.addEventListener('change', () => syncExpertSettingsFromForm(root));
    }

    window.saveExpertSettings = function() {
      const root = document.getElementById('commonFilterContent');
      if (!root) return;
      syncExpertSettingsFromForm(root);

      const modal = document.getElementById('filterModal');
      if (modal) modal.classList.remove('show');
      // form DOM은 지우지 않는다. 검색 로직이 현재 DOM 값을 읽는 구조이므로 hidden 상태로 유지한다.
    };
    
    const SearchState = {
      isSearching: false,
      start() {
        this.isSearching = true;
        document.body.classList.add('search-mode');
      },
      end() {
        this.isSearching = false;
        document.body.classList.remove('search-mode');
      }
    };
    
    window.toggleFilterModal = function() {
      const target = document.getElementById('commonFilterContent');
      const modal = document.getElementById('filterModal');
      const template = document.getElementById('filterTemplateV2');
      if (!target || !modal || !template) return;
      const isHidden = !modal.classList.contains('show');
      if (isHidden) {
        if (!target.children.length) {
          target.appendChild(template.content.cloneNode(true));
          applyExpertSettingsToForm(target);
          bindExpertSettingsLiveSync(target);
        }
        modal.classList.add('show');
      } else {
        syncExpertSettingsFromForm(target);
        modal.classList.remove('show');
        // 새로고침 초기화 원칙을 위해 localStorage는 사용하지 않고, 세션 DOM만 유지한다.
      }
    };
    
    window.toggleInquiry = function(id) {
      const content = document.getElementById('inqContent_' + id);
      if (content) content.classList.toggle('show');
    };
  </script>
  
  <meta name="apple-mobile-web-app-title" content="쇼핑검색 디스원" />
  <meta property="og:title" content="쇼핑검색 디스원" />
  <meta name="description" content="쇼핑검색 디스원" />
  <meta property="og:description" content="쇼핑검색 디스원" />
  <meta name="theme-color" content="#ffffff" />
  <title>쇼핑검색 디스원</title>
  
  <link rel="stylesheet" href="styles/main.css?v=3.4.5" />
  <link rel="stylesheet" href="styles/theme-modern.css?v=3.4.5" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>

<body>
  <header class="app-header">
    <div class="header-content">
      <a href="/" class="logo" onclick="event.preventDefault(); goHome();">
        <img src="assets/thisone-logo-rough.png" alt="ThisOne" class="logo-img" />
      </a>
    </div>
  </header>

  <main class="app-main">
    <section class="landing-view" id="landing">
      <div id="welcome" class="welcome-section">
        <h2 class="rounded-headline">이것저것 찾지 말고,<br><span class="point-text">하나만</span> 잘 고르자!</h2>
      </div>

      <div class="search-wrap" id="landingSearch">
        <div class="search-box">
          <div class="img-preview" id="imgPreview">
            <div class="pv-item">
              <img class="pv-img" id="previewImg" src="" alt="미리보기">
              <button class="pv-del" type="button" onclick="removeImg()">✕</button>
            </div>
          </div>

          <div class="input-row">
            <textarea class="msg-input" id="msgInput" placeholder="검색어 또는 이미지 붙여넣기..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)" onpaste="handlePaste(event)"></textarea>
            <div class="footer-right">
              <button class="icon-btn img-btn" type="button" onclick="document.getElementById('fileInput').click()" title="이미지 업로드">
                <span class="new-badge">NEW</span>
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
              </button>
              <button class="icon-btn send-btn" id="sendBtn" type="button">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"></circle><line x1="16.5" y1="16.5" x2="21" y2="21"></line></svg>
              </button>
            </div>
          </div>
        </div>
        <div class="search-hint">예: 맘카페 반응 좋은 유모차 · 배송비 포함 가장 합리적인 공기청정기</div>
      </div>
      
      <div class="settings-trigger">
        <button type="button" class="text-btn" onclick="window.toggleFilterModal()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
          검색설정
        </button>
      </div>

      <div class="trending-section">
        <div class="trending-label">추천 검색어</div>
        <div id="trendingList" class="trending-list"></div>
      </div>
    </section>

    <section class="results-view" id="resultsContainer">
      <div id="msgContainer"></div>
    </section>
  </main>

  <footer class="app-footer">
    <div class="ftr-content">
      <a href="/" class="ftr-logo">ThisOne</a>
      <button type="button" class="text-btn" onclick="window.ThisOneUI.openInquiryBoard()">문의하기</button>
    </div>
  </footer>

  <div class="modal-overlay" id="filterModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3>검색설정</h3>
        <button class="close-btn" onclick="window.toggleFilterModal()">✕</button>
      </div>
      <div id="commonFilterContent" class="modal-body"></div>
    </div>
  </div>

  <div id="inquiryModal" class="modal-overlay">
    <div class="modal-box modal-lg">
      <div class="modal-header">
        <h3>📋 고객지원 센터</h3>
        <button class="close-btn" onclick="window.ThisOneUI.closeInquiryBoard()">✕</button>
      </div>
      <div id="inquiryListArea" class="modal-body">
        <div class="action-row right">
          <button class="btn btn-primary" onclick="window.ThisOneUI.showInquiryForm()">✍️ 문의하기</button>
        </div>
        <div id="inquiryList" class="empty-state">목록을 불러오는 중...</div>
      </div>
      <div id="inquiryFormArea" class="modal-body">
        <div class="form-group"><label>제목</label><input type="text" id="inqTitle" class="form-input" placeholder="제목을 입력하세요"></div>
        <div class="form-group"><label>비밀번호</label><input type="password" id="inqPassword" class="form-input" placeholder="4자리 이상 입력"></div>
        <div class="form-group"><label>내용</label><textarea id="inqContent" class="form-input" rows="5" placeholder="궁금하신 내용을 남겨주세요"></textarea></div>
        <div class="action-row right">
          <button class="btn btn-secondary" onclick="window.ThisOneUI.hideInquiryForm()">취소</button>
          <button id="inqSubmitBtn" class="btn btn-primary" onclick="window.ThisOneUI.submitInquiry()">등록하기</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

  <template id="filterTemplateV2">
    <div class="filter-panel">
      <div class="form-group">
        <label class="sub-label">가격 범위</label>
        <div class="input-group">
          <input type="number" id="minPrice" class="form-input sm" placeholder="최소">
          <span class="separator">-</span>
          <input type="number" id="maxPrice" class="form-input sm" placeholder="최대">
        </div>
      </div>
      <div class="filter-grid">
        <select id="resultCount" class="form-select"><option value="3">3개 이하</option><option value="5" selected>5개 이하</option><option value="10">10개 이하</option></select>
        <label class="check-btn"><input type="checkbox" id="freeShipping" checked> 무료배송</label>
        <label class="check-btn"><input type="checkbox" id="excludeOverseas"> 직구제외</label>
        <label class="check-btn"><input type="checkbox" id="excludeAgent"> 대행제외</label>
        <label class="check-btn"><input type="checkbox" id="excludeUsed"> 중고/리퍼제외</label>
        <label class="check-btn"><input type="checkbox" id="excludeRental"> 렌탈제외</label>
      </div>
      <div class="filter-footer">
        <div class="slider-group">
          <div class="slider-header"><label class="sub-label">검색시간</label><span id="patienceVal" class="point-text">20초</span></div>
          <input type="range" id="patienceTime" class="form-range" min="5" max="60" value="20" oninput="document.getElementById('patienceVal').textContent=this.value+'초'">
          <div class="slider-labels"><span>빠른검색</span><span>심층검색</span></div>
        </div>
        <button type="button" class="btn btn-dark" onclick="saveExpertSettings()">적용</button>
      </div>
    </div>
  </template>

  <script src="js/trajectoryLogger.js?v=3.4.5" defer></script>
  <script src="js/api.js?v=3.4.5"></script>
  <script src="js/productFamilies.js?v=3.4.5"></script>
  <script src="js/ranking.js?v=3.4.5"></script>
  <script src="js/model_dedupe_patch.js?v=3.4.5"></script>
  <script src="js/mobile_search_safety_patch.js?v=3.4.5"></script>
  <script src="js/result_cards.js?v=3.4.5"></script>
  <script src="js/thisone_ui_v3.js?v=3.4.5"></script>
  <script src="js/search_dropdown.js?v=3.4.5"></script>
  <script src="js/thisone_app_v3_final.js?v=3.4.5"></script>
</body>
</html>
