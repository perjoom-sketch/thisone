<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ThisOne" />
  <meta property="og:title" content="지능형 쇼핑 디스원" />
  <meta name="description" content="이것저것 찾지 말고, 하나만 잘 고르자! 쇼핑 자율주행의 시작. 세상에 단 하나뿐인 지능형 가격비교 엔진, 디스원." />
  <meta name="theme-color" content="#ffffff" />
  <title>지능형 쇼핑 디스원</title>
  <link rel="stylesheet" href="/styles/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
</head>
<body>
  <div class="hdr">
<a href="/" class="logo" style="text-decoration:none; color:inherit;">
  <img
    src="/assets/thisone-logo-rough.png"
    alt="ThisOne"
    class="logo-img"
  />
  <span class="slogan">고민은 디스원, 만족은 당신꺼</span>
</a>
</div>

  <div id="landing">
    <div id="welcome">
      <h2 class="rounded-headline">이것저것 찾지 말고,<br><span class="point-text">하나만</span> 잘 고르자!</h2>
    </div>

    <div class="search-wrap" id="landingSearch">
      <div class="search-box">
        <div class="img-preview" id="imgPreview">
          <div class="pv-item">
            <img class="pv-img" id="previewImg" src="" alt="">
            <button class="pv-del" type="button" onclick="removeImg()">✕</button>
          </div>
        </div>

        <div class="input-row">
          <textarea
            class="msg-input"
            id="msgInput"
            placeholder="검색어 입력 또는 이미지 붙여넣기(Ctrl+V)..."
            rows="1"
            oninput="autoResize(this)"
            onkeydown="handleKey(event)"
          ></textarea>

          <div class="footer-right">
            <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()" title="이미지 업로드 또는 붙여넣기">
              <span class="new-badge">NEW</span>
              <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                <circle cx="12" cy="13" r="4"></circle>
              </svg>
            </button>

            <button class="send-btn" id="sendBtn" type="button" onclick="sendMsg()">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="7"></circle>
                <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div class="filter-trigger" onclick="toggleFilterModal()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
        검색설정
      </div>

      <!-- 인라인 설정 영역 (펼침/접힘) -->
      <div id="inlineFilter" class="inline-filter-wrap" style="display:none;">
        <div class="setting-group">
          <label>가격 범위 (원)</label>
          <div class="price-inputs">
            <input type="number" id="minPrice" placeholder="최소" />
            <span>~</span>
            <input type="number" id="maxPrice" placeholder="최대" />
          </div>
        </div>
        <div class="setting-group inline" style="display:flex; flex-wrap:nowrap; gap:16px;">
          <label><input type="checkbox" id="freeShipping"> 무료배송만</label>
          <label><input type="checkbox" id="excludeOverseas" checked> 해외직구 제외</label>
          <label><input type="checkbox" id="excludeAgent" checked> 구매대행 제외</label>
          <label><input type="checkbox" id="excludeUsed" checked> 중고/리퍼 제외</label>
          <label><input type="checkbox" id="includeRental" checked> 렌탈 상품 포함</label>
        </div>
        <div class="filter-bottom-row">
          <div class="result-count-wrap">
            <span class="count-label">검색결과</span>
            <select id="resultCount">
              <option value="3">3개</option>
              <option value="5" selected>5개</option>
              <option value="7">7개</option>
              <option value="10">10개</option>
            </select>
          </div>

          <div class="patience-wrap">
            <div class="patience-header">
              <span class="patience-label">분석시간</span>
              <div class="patience-val-wrap"><span id="patienceVal">20</span>초</div>
            </div>
            <input type="range" id="patienceTime" min="5" max="120" step="5" value="20" oninput="updatePatienceLabel(this.value)">
          </div>

          <div class="mobile-btn-wrap">
            <button class="sub-btn" id="pcViewBtn" onclick="togglePcView()">💻 PC 버전으로 보기</button>
          </div>

          <div class="save-btn-wrap">
            <button class="save-btn" onclick="saveExpertSettings()">설정 저장</button>
          </div>
        </div>

        <script>
          function updatePatienceLabel(val) {
            const v = document.getElementById('patienceVal');
            if(v) v.textContent = val;
          }
        </script>
      </div>


      <div class="search-hint">예: 맘카페 반응 좋은 유모차 · 배송비 포함 가장 합리적인 공기청정기</div>
      <div id="trendingChips" class="trending-chips"></div>
    </div>


    <div id="chips">
      <!-- 트렌드 알고리즘에 의해 실시간으로 생성됩니다 -->
    </div>
  </div>

  <div id="stickySearch" class="search-wrap" style="display:none; padding-top: 12px; border-bottom: 1px solid #eee; background: #fff; position: sticky; top: 0; z-index: 1000; padding-bottom: 8px;">
    <div class="search-box">
      <div class="img-preview" id="imgPreview2">
        <div class="pv-item">
          <img class="pv-img" id="previewImg2" src="" alt="">
          <button class="pv-del" type="button" onclick="removeImg()">✕</button>
        </div>
      </div>

      <div class="input-row">
        <textarea
          class="msg-input"
          id="msgInput2"
          placeholder="검색어 입력 또는 이미지 붙여넣기(Ctrl+V)..."
          rows="1"
          oninput="autoResize(this)"
          onkeydown="handleKey(event)"
        ></textarea>

        <div class="footer-right">
          <button class="img-btn" type="button" onclick="document.getElementById('fileInput').click()">
            <span class="new-badge">NEW</span>
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
              <circle cx="12" cy="13" r="4"></circle>
            </svg>
          </button>

          <button class="send-btn" id="sendBtn2" type="button" onclick="sendMsg()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="7"></circle>
              <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
            </svg>
          </button>
        </div>
      </div>
    </div>

    <div class="filter-trigger" onclick="toggleFilterModal()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
      검색설정
    </div>
  </div>

  <div class="content" id="content"></div>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

  <script src="/js/trajectoryLogger.js" defer></script>
  <script src="/js/api.js" defer></script>
  <script src="/js/ui.js" defer></script>
  <script src="/js/productFamilies.js" defer></script>
  <script src="/js/ranking.js" defer></script>
  <script src="/js/app.js" defer></script>
</body>
</html>
