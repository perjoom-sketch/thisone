<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ThisOne">
<meta property="og:title" content="ThisOne - 구매결정 AI">
<meta name="theme-color" content="#0A0A0F">
<title>ThisOne</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap');
:root{
  --bg-primary:#0A0A0F;--bg-secondary:#12121A;--bg-card:#1A1A25;--bg-card-hover:#222233;
  --accent:#6C5CE7;--accent-light:#A29BFE;--accent-glow:rgba(108,92,231,0.3);
  --text-primary:#F0F0F5;--text-secondary:#8888AA;--text-muted:#55556E;
  --border:rgba(255,255,255,0.06);--border-accent:rgba(108,92,231,0.3);
  --gradient-1:linear-gradient(135deg,#6C5CE7,#a855f7,#ec4899);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg-primary);color:var(--text-primary);font-family:'Noto Sans KR',sans-serif;min-height:100vh;overflow-x:hidden;}

.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;position:relative;overflow:hidden;}

/* Ambient */
.orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
.orb-1{width:500px;height:500px;background:radial-gradient(circle,rgba(108,92,231,.15),transparent 70%);top:-10%;left:-10%;}
.orb-2{width:400px;height:400px;background:radial-gradient(circle,rgba(168,85,247,.1),transparent 70%);bottom:-5%;right:-10%;}
.orb-3{width:300px;height:300px;background:radial-gradient(circle,rgba(236,72,153,.08),transparent 70%);top:40%;right:10%;}
.grid-overlay{position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;}

.floating-emoji{position:fixed;pointer-events:none;z-index:0;opacity:.12;animation:floatBob 6s ease-in-out infinite;}
@keyframes floatBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}

/* Header */
.header{width:100%;max-width:800px;padding:28px 24px 0;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:10;}
.logo-group{display:flex;align-items:center;gap:12px;}
.logo-mark{width:40px;height:40px;border-radius:12px;background:var(–gradient-1);display:flex;align-items:center;justify-content:center;font-family:‘Outfit’,sans-serif;font-weight:800;font-size:18px;color:#fff;box-shadow:0 4px 20px var(–accent-glow);}
.logo-text{font-family:‘Outfit’,sans-serif;font-weight:700;font-size:22px;letter-spacing:-.5px;background:var(–gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.beta-badge{padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;background:rgba(108,92,231,.15);color:var(–accent-light);border:1px solid rgba(108,92,231,.2);}

/* Hero */
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:700px;padding:0 24px;position:relative;z-index:10;}
.hero-title{text-align:center;margin-bottom:36px;}
.hero-title h1{font-family:‘Outfit’,sans-serif;font-size:42px;font-weight:900;letter-spacing:-1.5px;line-height:1.15;margin-bottom:14px;}
.gradient-text{background:var(–gradient-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.hero-subtitle{font-size:15px;color:var(–text-secondary);line-height:1.6;font-weight:300;}

/* Search */
.search-wrapper{width:100%;}
.search-box{width:100%;background:var(–bg-card);border:1px solid var(–border);border-radius:20px;padding:6px;transition:all .3s;}
.search-box.focused{border-color:var(–border-accent);box-shadow:0 0 0 4px rgba(108,92,231,.08),0 8px 40px rgba(0,0,0,.3);background:var(–bg-secondary);}
.search-inner{display:flex;align-items:center;gap:4px;}
.search-input{flex:1;background:none;border:none;outline:none;padding:14px 16px;font-size:15px;color:var(–text-primary);font-family:‘Noto Sans KR’,sans-serif;}
.search-input::placeholder{color:var(–text-muted);font-weight:300;}
.search-actions{display:flex;align-items:center;gap:4px;padding-right:4px;}
.icon-btn{width:42px;height:42px;border-radius:12px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;background:transparent;color:var(–text-muted);}
.icon-btn:hover{background:rgba(255,255,255,.05);color:var(–text-secondary);}
.submit-btn{background:var(–gradient-1);color:#fff;box-shadow:0 4px 16px var(–accent-glow);}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(–accent-glow);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:.4;transform:none;}

.img-preview-strip{padding:8px 12px 4px;display:flex;gap:8px;}
.preview-thumb{position:relative;width:56px;height:56px;border-radius:10px;overflow:hidden;border:1px solid var(–border);}
.preview-thumb img{width:100%;height:100%;object-fit:cover;}
.preview-remove{position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:#ff4757;border:2px solid var(–bg-card);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

.search-hint{text-align:center;margin-top:12px;font-size:12px;color:var(–text-muted);font-weight:300;}
.search-hint span{color:var(–text-secondary);}

/* Chips */
.chips-area{width:100%;margin-top:28px;}
.chips-scroll{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.chip{display:flex;align-items:center;gap:7px;padding:9px 16px;background:var(–bg-card);border:1px solid var(–border);border-radius:100px;cursor:pointer;transition:all .25s;font-size:13px;color:var(–text-secondary);white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.chip:hover{background:var(–bg-card-hover);border-color:var(–border-accent);color:var(–text-primary);transform:translateY(-2px);}

/* Results */
.results{width:100%;max-width:700px;padding:20px 24px 40px;position:relative;z-index:10;}
.user-q{background:var(–bg-card);border:1px solid var(–border);border-radius:14px;padding:14px 18px;margin-bottom:16px;font-size:14px;color:var(–text-secondary);}
.user-q-label{font-size:10px;color:var(–text-muted);margin-bottom:6px;letter-spacing:.05em;}

/* Result Cards */
.pick-card{background:linear-gradient(135deg,rgba(108,92,231,.12),rgba(168,85,247,.06));border:1.5px solid rgba(108,92,231,.3);border-radius:18px;padding:22px;margin-bottom:12px;}
.pick-badge{display:inline-block;background:var(–gradient-1);color:#fff;font-size:11px;font-weight:700;border-radius:8px;padding:4px 12px;margin-bottom:14px;}
.pick-title{font-family:‘Outfit’,sans-serif;font-size:20px;font-weight:700;color:var(–text-primary);margin-bottom:18px;line-height:1.3;}
.pick-reasons{display:flex;flex-direction:column;gap:12px;}
.pick-reason{display:flex;gap:12px;align-items:flex-start;}
.reason-num{width:24px;height:24px;border-radius:50%;background:rgba(108,92,231,.2);color:var(–accent-light);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.reason-text{font-size:14px;color:#CBD5E1;line-height:1.6;}

.compare-card{background:var(–bg-card);border:1px solid var(–border);border-radius:18px;overflow:hidden;margin-bottom:12px;}
.compare-title{padding:14px 18px;font-size:13px;font-weight:700;color:var(–accent-light);border-bottom:1px solid var(–border);}
.compare-table{width:100%;border-collapse:collapse;}
.compare-table th{padding:10px 14px;text-align:left;font-size:11px;color:var(–text-muted);font-weight:600;background:var(–bg-secondary);}
.compare-table td{padding:13px 14px;font-size:13px;color:var(–text-primary);border-bottom:1px solid var(–border);}
.compare-table tr:last-child td{border-bottom:none;}
.compare-table tr:first-child td{color:var(–accent-light);font-weight:700;background:rgba(108,92,231,.08);}

.reject-card{background:var(–bg-card);border:1px solid var(–border);border-radius:18px;padding:18px;margin-bottom:12px;}
.reject-title{font-size:13px;font-weight:700;color:#F87171;margin-bottom:12px;}
.reject-item{display:flex;gap:8px;margin-bottom:8px;font-size:13px;color:var(–text-muted);line-height:1.6;}
.reject-item:last-child{margin-bottom:0;}
.reject-name{color:var(–text-secondary);font-weight:600;}

/* Typing */
.typing-card{background:var(–bg-card);border:1px solid var(–border);border-radius:18px;padding:22px;margin-bottom:12px;}
.typing{display:flex;gap:5px;align-items:center;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(–accent);animation:bounce .8s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-7px);}}

.footer{width:100%;max-width:700px;padding:20px 24px 28px;text-align:center;position:relative;z-index:10;font-size:13px;color:var(–text-muted);font-weight:300;line-height:1.7;}
.footer strong{color:var(–text-secondary);font-weight:500;}

#fileInput{display:none;}

@media(max-width:640px){
.hero-title h1{font-size:30px;}
.chips-scroll{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;-webkit-overflow-scrolling:touch;}
.chips-scroll::-webkit-scrollbar{display:none;}
.header{padding:20px 16px 0;}
.hero,.results{padding-left:16px;padding-right:16px;}
}
</style>

</head>

<input type="file" id="fileInput" accept="image/*" onchange="handleImg(event)">

<script>
const MODEL='claude-sonnet-4-20250514';
let pendingImg=null, loading=false, history=[];

const PROMPT=`당신은 ThisOne 구매결정 AI입니다.
사용자가 상품을 물어보면 웹 검색으로 네이버 쇼핑, 쿠팡 등에서 실제 가격을 찾아 분석하고, 반드시 아래 JSON 형식으로만 답하세요. JSON 외 다른 텍스트 없이.

{
  "pick": "추천 상품명",
  "reasons": ["이유1(가격/배송)", "이유2(리뷰/평판)", "이유3(실용성)"],
  "compare": [
    {"name":"상품명","price":"가격","delivery":"배송","review":"⭐4.5"},
    {"name":"상품명","price":"가격","delivery":"배송","review":"⭐4.2"}
  ],
  "rejects": [
    {"name":"탈락상품명","reason":"탈락이유"}
  ]
}`;

function quick(t){document.getElementById('searchInput').value=t;sendMsg();}

function handleImg(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    pendingImg={data:ev.target.result.split(',')[1],src:ev.target.result};
    document.getElementById('previewImg').src=ev.target.result;
    document.getElementById('imgStrip').style.display='flex';
  };
  r.readAsDataURL(file);e.target.value='';
}
function removeImg(){pendingImg=null;document.getElementById('imgStrip').style.display='none';}

async function sendMsg(){
  if(loading)return;
  const inp=document.getElementById('searchInput');
  const txt=inp.value.trim();
  if(!txt&&!pendingImg)return;

  // 히어로 숨기고 결과 표시
  document.getElementById('heroSection').style.display='none';
  const resultsEl=document.getElementById('results');
  resultsEl.style.display='block';

  // 검색창을 상단에 고정으로 이동
  const searchWrapper=document.querySelector('.search-wrapper');
  const hdr=document.querySelector('.header');
  hdr.after(searchWrapper);
  searchWrapper.style.padding='12px 24px';
  searchWrapper.style.borderBottom='1px solid rgba(255,255,255,.06)';
  searchWrapper.style.position='sticky';
  searchWrapper.style.top='73px';
  searchWrapper.style.zIndex='99';
  searchWrapper.style.background='var(--bg-primary)';

  const uc=[];
  if(pendingImg) uc.push({type:'image',source:{type:'base64',media_type:'image/jpeg',data:pendingImg.data}});
  uc.push({type:'text',text:txt||'이 이미지 상품을 가격비교해줘'});

  addUserQ(txt||'📷 이미지로 검색');
  history.push({role:'user',content:uc});
  inp.value='';removeImg();

  loading=true;
  document.getElementById('sendBtn').disabled=true;
  const typingEl=addTyping();

  try{
    const res=await fetch('/api/chat',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:MODEL,max_tokens:1500,system:PROMPT,messages:history})
    });
    const data=await res.json();
    typingEl.remove();
    const raw=data.content.filter(b=>b.type==='text').map(b=>b.text).join('');
    history.push({role:'assistant',content:raw});
    try{
      const j=JSON.parse(raw.replace(/```json|```/g,'').trim());
      addResultCard(j);
    }catch{addFallback(raw);}
  }catch{
    typingEl.remove();
    addFallback('검색 중 오류가 발생했습니다. 다시 시도해주세요.');
  }
  loading=false;
  document.getElementById('sendBtn').disabled=false;
}

function addUserQ(txt){
  const d=document.createElement('div');
  d.innerHTML=`<div class="user-q-label">🔍 검색</div><div class="user-q">${esc(txt)}</div>`;
  document.getElementById('results').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addResultCard(j){
  const d=document.createElement('div');
  let html=`<div class="pick-card">
    <div class="pick-badge">✅ 이거요</div>
    <div class="pick-title">${esc(j.pick)}</div>
    <div class="pick-reasons">`;
  (j.reasons||[]).forEach((r,i)=>{
    html+=`<div class="pick-reason"><div class="reason-num">${i+1}</div><div class="reason-text">${esc(r)}</div></div>`;
  });
  html+=`</div></div>`;

  if(j.compare?.length){
    html+=`<div class="compare-card"><div class="compare-title">📊 비교</div>
      <table class="compare-table"><tr><th>상품</th><th>가격</th><th>배송</th><th>리뷰</th></tr>`;
    j.compare.forEach(c=>{
      html+=`<tr><td>${esc(c.name)}</td><td>${esc(c.price)}</td><td>${esc(c.delivery)}</td><td>${esc(c.review)}</td></tr>`;
    });
    html+=`</table></div>`;
  }

  if(j.rejects?.length){
    html+=`<div class="reject-card"><div class="reject-title">❌ 탈락 이유</div>`;
    j.rejects.forEach(r=>{
      html+=`<div class="reject-item">✕ <span class="reject-name">${esc(r.name)}</span>&nbsp;— ${esc(r.reason)}</div>`;
    });
    html+=`</div>`;
  }
  d.innerHTML=html;
  document.getElementById('results').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addFallback(txt){
  const d=document.createElement('div');
  d.innerHTML=`<div class="pick-card">${txt.replace(/\n/g,'<br>')}</div>`;
  document.getElementById('results').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
}

function addTyping(){
  const d=document.createElement('div');
  d.className='typing-card';
  d.innerHTML=`<div class="typing"><span></span><span></span><span></span></div>`;
  document.getElementById('results').appendChild(d);
  d.scrollIntoView({behavior:'smooth'});
  return d;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
